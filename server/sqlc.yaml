version: "2"
sql:
  - engine: "postgresql"
    schema: "internal/repository/migrations"
    queries: "internal/repository/queries"
    gen:
      go:
        package: "sqlcgen"
        out: "internal/repository/sqlcgen"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_empty_slices: true
        overrides:
          - db_type: "pg_catalog.jsonb"
            go_type: "encoding/json.RawMessage"
          - db_type: "pg_catalog.timestamptz"
            go_type:
              import: "time"
              type: "Time"
            nullable: false
          - db_type: "pg_catalog.timestamptz"
            go_type:
              import: "time"
              type: "Time"
              pointer: true
            nullable: true
