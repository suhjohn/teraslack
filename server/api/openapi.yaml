              schema:
                $ref: "#/components/schemas/APIKeySecretResponse"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: token
  headers:
    Location:
      description: Resource URI.
      schema:
        type: string
  responses:
    NoContent:
      description: No content.
    ApiErrorResponse:
      description: API error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/APIError"
  parameters:
    WorkspaceIDPath:
      name: id
      in: path
      required: true
      description: Workspace identifier.
      schema:
        type: string
    AuthProviderPath:
      name: provider
      in: path
      required: true
      description: OAuth provider name.
      schema:
        $ref: "#/components/schemas/AuthProvider"
    WorkspaceIDQuery:
      name: workspace_id
      in: query
      description: Filter results by workspace identifier.
      schema:
        type: string
    UserIDPath:
      name: id
      in: path
      required: true
      description: User identifier.
      schema:
        type: string
    UserIDPathNamed:
      name: user_id
      in: path
      required: true
      description: User identifier.
      schema:
        type: string
    ConversationIDPath:
      name: id
      in: path
      required: true
      description: Conversation identifier.
      schema:
        type: string
    ConversationIDPathNamed:
      name: conversation_id
      in: path
      required: true
      description: Conversation identifier.
      schema:
        type: string
    ExternalWorkspaceIDPath:
      name: external_workspace_id
      in: path
      required: true
      description: External workspace connection identifier.
      schema:
        type: string
    ExternalMemberIDPath:
      name: external_member_id
      in: path
      required: true
      description: External member identifier.
      schema:
        type: string
    MessageTSPath:
      name: message_ts
      in: path
      required: true
      description: Message timestamp — the unique identifier for a message within a conversation.
      schema:
        type: string
    ReactionNamePath:
      name: reaction_name
      in: path
      required: true
      description: Emoji reaction name (e.g. "thumbsup").
      schema:
        type: string
    FileIDPath:
      name: id
      in: path
      required: true
      description: File identifier.
      schema:
        type: string
    EventSubscriptionIDPath:
      name: id
      in: path
      required: true
      description: Event subscription identifier.
      schema:
        type: string
    APIKeyIDPath:
      name: id
      in: path
      required: true
      description: API key identifier.
      schema:
        type: string
    CursorQuery:
      name: cursor
      in: query
      description: Opaque pagination cursor returned by a previous request.
      schema:
        type: string
    LimitQuery:
      name: limit
      in: query
      description: Maximum number of items to return per page.
      schema:
        type: integer
        format: int32
        minimum: 0
  schemas:
    HealthStatusResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          description: Service health status.
          enum: [ok]
    APIError:
      type: object
      description: Standard error envelope returned for all non-2xx responses.
      required: [code, message]
      properties:
        code:
          type: string
          description: Machine-readable error code (e.g. "not_found", "validation_error").
        message:
          type: string
          description: Human-readable error description.
        request_id:
          type: string
          description: Unique request identifier for debugging.
        errors:
          type: array
          description: Field-level validation errors, present when code is "validation_error".
          items:
            $ref: "#/components/schemas/FieldError"
    FieldError:
      type: object
      description: A single field-level validation error.
      required: [field, code, message]
      properties:
        field:
          type: string
          description: JSON path of the invalid field (e.g. "name").
        code:
          type: string
          description: Machine-readable validation code (e.g. "required", "too_long").
        message:
          type: string
          description: Human-readable explanation of the validation failure.
    FreeFormJSON: {}
    FreeFormObject:
      type: object
      additionalProperties: true
    PrincipalType:
      type: string
      description: "The kind of identity: human user, AI agent, or system service."
      enum: [human, agent, system]
    AccountType:
      type: string
      description: "Permission tier within a workspace."
      enum: [primary_admin, admin, member]
    DelegatedRole:
      type: string
      description: Fine-grained administrative role that can be granted to a user.
      enum:
        [
          channels_admin,
          roles_admin,
          security_admin,
          integrations_admin,
          support_readonly,
        ]
    ExternalPrincipalAccessMode:
      type: string
      description: Level of access granted to an external principal.
      enum: [external_shared, external_shared_readonly]
    ConversationPostingPolicyType:
      type: string
      description: Who is allowed to post messages in a conversation.
      enum: [everyone, admins_only, members_with_permission, custom]
    AuthProvider:
      type: string
      description: Supported auth provider.
      enum: [email, github, google]
    WorkspaceDiscoverability:
      type: string
      description: Whether the workspace can be discovered and joined without an invite.
      enum: [open, invite_only]
    ConversationType:
      type: string
      description: "Channel type: public_channel, private_channel, im (1:1 DM), or mpim (group DM)."
      enum: [public_channel, private_channel, im, mpim]
    WorkspaceIcon:
      type: object
      properties:
        image_original:
          type: string
        image_34:
          type: string
        image_44:
          type: string
    WorkspaceBilling:
      type: object
      required: [plan, status]
      properties:
        plan:
          type: string
        status:
          type: string
        billing_email:
          type: string
    Workspace:
      type: object
      description: A workspace. The top-level organizational unit.
      required:
        - id
        - name
        - domain
        - email_domain
        - description
        - icon
        - discoverability
        - default_channels
        - preferences
        - billing
        - created_at
        - updated_at
      properties:
        id:
          type: string
          description: Unique workspace identifier.
        name:
          type: string
          description: Display name of the workspace.
        domain:
          type: string
          description: Unique URL-safe slug for the workspace (e.g. "acme-corp").
        email_domain:
          type: string
          description: Email domain used for auto-joining (e.g. "acme.com").
        description:
          type: string
          description: Short description of the workspace.
        icon:
          $ref: "#/components/schemas/WorkspaceIcon"
        discoverability:
          $ref: "#/components/schemas/WorkspaceDiscoverability"
        default_channels:
          type: array
          description: Conversation IDs that new members are automatically added to.
          items:
            type: string
        preferences:
          $ref: "#/components/schemas/FreeFormObject"
        billing:
          $ref: "#/components/schemas/WorkspaceBilling"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    WorkspaceBillableInfo:
      type: object
      required: [user_id, billing_active]
      properties:
        user_id:
          type: string
        billing_active:
          type: boolean
    WorkspaceBillableInfoMap:
      type: object
      additionalProperties:
        $ref: "#/components/schemas/WorkspaceBillableInfo"
    WorkspaceAccessLog:
      type: object
      required: [user_id, username, event_type, date_first, date_last]
      properties:
        user_id:
          type: string
        username:
          type: string
        event_type:
          type: string
        date_first:
          type: string
          format: date-time
        date_last:
          type: string
          format: date-time
    WorkspaceIntegrationLog:
      type: object
      required: [app_id, app_type, app_name, user_id, user_name, action, date]
      properties:
        app_id:
          type: string
        app_type:
          type: string
        app_name:
          type: string
        user_id:
          type: string
        user_name:
          type: string
        action:
          type: string
        date:
          type: string
          format: date-time
    AuthorizationAuditLog:
      type: object
      description: A record of an authorization-relevant action (permission change, access grant, etc.).
      required: [id, workspace_id, action, resource, resource_id, created_at]
      properties:
        id:
          type: string
          description: Unique audit log entry identifier.
        workspace_id:
          type: string
          description: Workspace where the action occurred.
        actor_id:
          type: string
          description: User who performed the action.
        api_key_id:
          type: string
          description: API key used to perform the action (if applicable).
        on_behalf_of:
          type: string
          description: User the action was performed on behalf of (for delegated actions).
        action:
          type: string
          description: Action performed (e.g. "grant_access", "revoke_key").
        resource:
          type: string
          description: Type of resource affected.
        resource_id:
          type: string
          description: Identifier of the resource affected.
        metadata:
          $ref: "#/components/schemas/FreeFormObject"
          description: Additional context about the action.
        created_at:
          type: string
          format: date-time
    TransferPrimaryAdminRequest:
      type: object
      required: [user_id]
      properties:
        user_id:
          type: string
    ExternalWorkspace:
      type: object
      required:
        [
          id,
          external_workspace_id,
          name,
          connection_type,
          connected,
          created_at,
        ]
      properties:
        id:
          type: string
        external_workspace_id:
          type: string
        name:
          type: string
        connection_type:
          type: string
        connected:
          type: boolean
        created_at:
          type: string
          format: date-time
        disconnected_at:
          type: string
          format: date-time
    CreateExternalWorkspaceRequest:
      type: object
      required: [external_workspace_id]
      properties:
        external_workspace_id:
          type: string
        name:
          type: string
        connection_type:
          type: string
    Account:
      type: object
      required:
        [
          id,
          principal_type,
          name,
          real_name,
          display_name,
          email,
          is_bot,
          deleted,
          profile,
          created_at,
          updated_at,
        ]
      properties:
        id:
          type: string
        principal_type:
          $ref: "#/components/schemas/PrincipalType"
        name:
          type: string
        real_name:
          type: string
        display_name:
          type: string
        email:
          type: string
        is_bot:
          type: boolean
        deleted:
          type: boolean
        profile:
          $ref: "#/components/schemas/UserProfile"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    WorkspaceMembership:
      type: object
      required:
        [id, account_id, workspace_id, created_at, updated_at]
      properties:
        id:
          type: string
        account_id:
          type: string
        workspace_id:
          type: string
        user_id:
          type: string
          description: Workspace-local compatibility user row, materialized lazily when needed.
        account_type:
          $ref: "#/components/schemas/AccountType"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    UserProfile:
      type: object
      required:
        - title
        - phone
        - status_text
        - status_emoji
        - status_expiration
        - avatar_hash
        - image_original
        - image_48
        - image_192
        - image_512
      properties:
        title:
          type: string
        phone:
          type: string
        status_text:
          type: string
        status_emoji:
          type: string
        status_expiration:
          type: integer
          format: int64
        avatar_hash:
          type: string
        image_original:
          type: string
        image_48:
          type: string
        image_192:
          type: string
        image_512:
          type: string
    User:
      type: object
      description: A user identity — can represent a human, an AI agent, or a system service.
      required:
        - id
        - workspace_id
        - name
        - real_name
        - display_name
        - email
        - principal_type
        - account_type
        - is_bot
        - deleted
        - profile
        - created_at
        - updated_at
      properties:
        id:
          type: string
          description: Unique user identifier.
        workspace_id:
          type: string
          description: Workspace this user belongs to.
        name:
          type: string
          description: Unique username within the workspace (used for @-mentions).
        real_name:
          type: string
          description: Full name of the user.
        display_name:
          type: string
          description: Name shown in the UI. Falls back to real_name if empty.
        email:
          type: string
          description: Email address associated with the user.
        principal_type:
          $ref: "#/components/schemas/PrincipalType"
        account_type:
          $ref: "#/components/schemas/AccountType"
        owner_id:
          type: string
          description: For agent users, the human user who owns this agent.
        delegated_roles:
          type: array
          description: Administrative roles delegated to this user.
          items:
            $ref: "#/components/schemas/DelegatedRole"
        is_bot:
          type: boolean
          description: Whether this user is a bot/agent (true) or human (false).
        deleted:
          type: boolean
          description: Whether this user has been deactivated.
        profile:
          $ref: "#/components/schemas/UserProfile"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    TopicPurpose:
      type: object
      required: [value, creator]
      properties:
        value:
          type: string
        creator:
          type: string
        last_set:
          type: string
          format: date-time
    Conversation:
      type: object
      description: A conversation — a channel, DM, or group DM where messages are exchanged.
      required:
        - id
        - workspace_id
        - name
        - type
        - creator_id
        - is_archived
        - topic
        - purpose
        - num_members
        - created_at
        - updated_at
      properties:
        id:
          type: string
          description: Unique conversation identifier.
        workspace_id:
          type: string
          description: Workspace this conversation belongs to.
        name:
          type: string
          description: Display name of the conversation (e.g. "general", "deploy-alerts").
        type:
          $ref: "#/components/schemas/ConversationType"
        creator_id:
          type: string
          description: User who created this conversation.
        is_archived:
          type: boolean
          description: Whether the conversation has been archived.
        topic:
          $ref: "#/components/schemas/TopicPurpose"
        purpose:
          $ref: "#/components/schemas/TopicPurpose"
        num_members:
          type: integer
          format: int32
          description: Current number of members in the conversation.
        last_message_ts:
          type: string
          description: Timestamp of the most recent message.
        last_activity_ts:
          type: string
          description: Timestamp of the most recent activity (message, reaction, etc.).
        last_read_ts:
          type: string
          description: Timestamp of the last message the authenticated user has read.
        has_unread:
          type: boolean
          description: Whether the authenticated user has unread messages in this conversation.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Reaction:
      type: object
      description: An emoji reaction on a message.
      required: [name, users, count]
      properties:
        name:
          type: string
          description: Emoji name (e.g. "thumbsup", "heart").
        users:
          type: array
          description: User IDs who added this reaction.
          items:
            type: string
        count:
          type: integer
          format: int32
          description: Total number of users who added this reaction.
    Message:
      type: object
      description: A single message within a conversation.
      required:
        - ts
        - channel_id
        - user_id
        - text
        - type
        - reply_count
        - reply_users_count
        - is_deleted
        - created_at
        - updated_at
      properties:
        ts:
          type: string
          description: Message timestamp — the unique identifier for this message within its conversation.
        channel_id:
          type: string
          description: Conversation this message belongs to.
        user_id:
          type: string
          description: User who sent the message.
        text:
          type: string
          description: Plain-text content of the message.
        thread_ts:
          type: string
          description: If this message is a reply, the timestamp of the parent message.
        type:
          type: string
          description: Message type (typically "message").
        subtype:
          type: string
          description: Message subtype for system messages (e.g. "channel_join", "channel_topic").
        blocks:
          $ref: "#/components/schemas/FreeFormJSON"
          description: Rich-text block layout (Block Kit format).
        metadata:
          $ref: "#/components/schemas/FreeFormJSON"
          description: Arbitrary key-value metadata attached to the message.
        edited_by:
          type: string
          description: User who last edited the message.
        edited_at:
          type: string
          description: Timestamp of the last edit.
        reactions:
          type: array
          description: Emoji reactions on this message.
          items:
            $ref: "#/components/schemas/Reaction"
        reply_count:
          type: integer
          format: int32
          description: Total number of replies in the thread (0 if not a thread parent).
        reply_users_count:
          type: integer
          format: int32
          description: Number of distinct users who have replied in the thread.
        latest_reply:
          type: string
          description: Timestamp of the most recent reply in the thread.
        is_deleted:
          type: boolean
          description: Whether this message has been soft-deleted.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    File:
      type: object
      description: An uploaded or external file.
      required:
        - id
        - workspace_id
        - name
        - title
        - mimetype
        - filetype
        - size
        - user_id
        - url_private
        - url_private_download
        - permalink
        - is_external
        - created_at
        - updated_at
      properties:
        id:
          type: string
          description: Unique file identifier.
        workspace_id:
          type: string
          description: Workspace this file belongs to.
        name:
          type: string
          description: Original filename.
        title:
          type: string
          description: Display title for the file.
        mimetype:
          type: string
          description: MIME type (e.g. "image/png", "application/pdf").
        filetype:
          type: string
          description: Short file type identifier (e.g. "png", "pdf").
        size:
          type: integer
          format: int64
          description: File size in bytes.
        user_id:
          type: string
          description: User who uploaded the file.
        url_private:
          type: string
          description: Authenticated URL to view the file.
        url_private_download:
          type: string
          description: Authenticated URL to download the file.
        permalink:
          type: string
          description: Permanent link to the file.
        is_external:
          type: boolean
          description: Whether this file is hosted externally.
        external_url:
          type: string
          description: For external files, the original URL.
        channels:
          type: array
          description: Conversations this file has been shared to.
          items:
            type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    EventSubscription:
      type: object
      description: A webhook subscription that delivers events to an external URL.
      required: [id, workspace_id, url, enabled, created_at, updated_at]
      properties:
        id:
          type: string
          description: Unique subscription identifier.
        workspace_id:
          type: string
          description: Workspace this subscription belongs to.
        url:
          type: string
          description: HTTPS URL where events are delivered via POST.
        type:
          type: string
          description: Filter to a specific event type (e.g. "conversation.message.created"). Omit to receive all types.
        resource_type:
          type: string
          description: Filter events to a specific resource type.
          enum: [workspace, user, conversation, file]
        resource_id:
          type: string
          description: Filter events to a specific resource instance.
        enabled:
          type: boolean
          description: Whether this subscription is currently active.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ExternalEvent:
      type: object
      description: An event representing something that happened in the system (message sent, user joined, etc.).
      required:
        [
          id,
          workspace_id,
          type,
          resource_type,
          resource_id,
          occurred_at,
          payload,
        ]
      properties:
        id:
          type: integer
          format: int64
          description: Monotonically increasing event ID. Use as cursor for pagination.
        workspace_id:
          type: string
          description: Workspace where the event occurred.
        type:
          type: string
          description: Event type (e.g. "conversation.message.created", "user.updated").
        resource_type:
          type: string
          description: Type of resource that produced the event.
          enum: [workspace, user, conversation, file]
        resource_id:
          type: string
          description: Identifier of the resource that produced the event.
        occurred_at:
          type: string
          format: date-time
          description: When the event occurred.
        payload:
          type: object
          additionalProperties: true
          description: Event-specific data (e.g. the full message object for a message event).
    AuthSession:
      type: object
      description: An authenticated session created via email auth or OAuth.
      required: [id, workspace_id, provider, expires_at, created_at]
      properties:
        id:
          type: string
          description: Unique session identifier.
        workspace_id:
          type: string
          description: Workspace the user authenticated into.
        account_id:
          type: string
          description: Canonical account identity for the session actor.
        membership_id:
          type: string
          description: Workspace membership identity for the session actor.
        user_id:
          type: string
          description: Compatibility workspace-local user identity when materialized.
        provider:
          $ref: "#/components/schemas/AuthProvider"
        token:
          type: string
          description: Session token (only returned on creation).
        expires_at:
          type: string
          format: date-time
          description: When the session expires.
        revoked_at:
          type: string
          format: date-time
          description: When the session was revoked (logged out).
        created_at:
          type: string
          format: date-time
    WorkspaceInvite:
