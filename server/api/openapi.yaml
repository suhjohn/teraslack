    AuthMeResponse:
      type: object
      description: The authenticated identity of the current request.
      required: [workspace_id, principal_type, is_bot]
      properties:
        workspace_id:
          type: string
          description: Workspace the caller is authenticated in.
        account_id:
          type: string
          description: Canonical account identity of the caller.
        membership_id:
          type: string
          description: Workspace membership identity of the caller when the caller is a member.
        user_id:
          type: string
          description: Compatibility workspace-local user identity of the caller when materialized.
        principal_type:
          $ref: "#/components/schemas/PrincipalType"
        account_type:
          $ref: "#/components/schemas/AccountType"
        is_bot:
          type: boolean
          description: Whether the caller is a bot/agent.
        permissions:
          type: array
          description: Effective permissions granted to the caller for this request context.
          items:
            type: string
        scopes:
          type: array
          description: OAuth scopes associated with the current request when applicable.
          items:
            type: string
        user:
          $ref: "#/components/schemas/User"
    APIKey:
      type: object
      description: An API key used to authenticate requests. Keys are scoped to a workspace and optionally to a specific user.
      required:
        - id
        - name
        - key_prefix
        - key_hint
        - workspace_id
        - user_id
        - created_by
        - permissions
        - request_count
        - revoked
        - created_at
        - updated_at
      properties:
        id:
          type: string
          description: Unique API key identifier.
        name:
          type: string
          description: Human-readable name for this key.
        description:
          type: string
          description: Optional longer description of the key's purpose.
        key_hash:
          type: string
          description: SHA-256 hash of the secret (never returned in list responses).
        key_prefix:
          type: string
          description: First characters of the key for identification (e.g. "tsk_abc").
        key_hint:
          type: string
          description: Masked version of the key shown in the UI (e.g. "tsk_abc...xyz").
        workspace_id:
          type: string
          description: Workspace this key is scoped to.
        user_id:
          type: string
          description: User this key acts on behalf of. Empty for workspace-level keys.
        created_by:
          type: string
          description: User who created this key.
        permissions:
          type: array
          description: List of permission strings granted to this key.
          items:
            type: string
        expires_at:
          type: string
          format: date-time
          description: When this key expires. Null means no expiration.
        last_used_at:
          type: string
          format: date-time
          description: Timestamp of the most recent authenticated request using this key.
        request_count:
          type: integer
          format: int64
          description: Total number of requests made with this key.
        revoked:
          type: boolean
          description: Whether this key has been revoked.
        revoked_at:
          type: string
          format: date-time
          description: When this key was revoked.
        rotated_to_id:
          type: string
          description: If this key was rotated, the ID of the replacement key.
        grace_period_ends_at:
          type: string
          format: date-time
          description: During rotation, the old key remains valid until this time.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    SearchResult:
