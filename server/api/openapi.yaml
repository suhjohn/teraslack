openapi: 3.0.3
info:
  title: Teraslack API
  version: 1.0.0
  description: Canonical HTTP API for Teraslack.
security:
  - bearerAuth: []
tags:
  - name: Health
  - name: Teams
  - name: Users
  - name: Access
  - name: Conversations
  - name: Messages
  - name: Usergroups
  - name: Files
  - name: Events
  - name: Event Subscriptions
  - name: Auth
  - name: API Keys
  - name: Search
paths:
  /healthz:
    get:
      tags: [Health]
      operationId: getHealth
      security: []
      responses:
        "200":
          description: Service health.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatusResponse"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /teams:
    get:
      tags: [Teams]
      operationId: listTeams
      responses:
        "200":
          description: Teams.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspacesCollection"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
    post:
      tags: [Teams]
      operationId: createTeam
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkspaceRequest"
      responses:
        "201":
          description: Team created.
          headers:
            Location:
              $ref: "#/components/headers/Location"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /teams/{id}:
    get:
      tags: [Teams]
      operationId: getTeam
      parameters:
        - $ref: "#/components/parameters/TeamIDPath"
      responses:
        "200":
          description: Team.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
    patch:
      tags: [Teams]
      operationId: updateTeam
      parameters:
        - $ref: "#/components/parameters/TeamIDPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWorkspaceRequest"
      responses:
        "200":
          description: Team updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /teams/{id}/admins:
    get:
      tags: [Teams]
      operationId: listTeamAdmins
      parameters:
        - $ref: "#/components/parameters/TeamIDPath"
      responses:
        "200":
          description: Team admins.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsersCollection"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /teams/{id}/owners:
    get:
      tags: [Teams]
      operationId: listTeamOwners
      parameters:
        - $ref: "#/components/parameters/TeamIDPath"
      responses:
        "200":
          description: Team owners.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsersCollection"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /teams/{id}/access-logs:
    get:
      tags: [Teams]
      operationId: listTeamAccessLogs
      parameters:
        - $ref: "#/components/parameters/TeamIDPath"
        - $ref: "#/components/parameters/LimitQuery"
      responses:
        "200":
          description: Team access logs.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceAccessLogsCollection"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /teams/{id}/authorization-audit-logs:
    get:
      tags: [Teams]
      operationId: listTeamAuthorizationAuditLogs
      parameters:
        - $ref: "#/components/parameters/TeamIDPath"
        - $ref: "#/components/parameters/LimitQuery"
      responses:
        "200":
          description: Team authorization audit logs.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthorizationAuditLogsCollection"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /teams/{id}/billable-info:
    get:
      tags: [Teams]
      operationId: getTeamBillableInfo
      parameters:
        - $ref: "#/components/parameters/TeamIDPath"
      responses:
        "200":
          description: Team billable info.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceBillableInfoMap"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /teams/{id}/billing:
    get:
      tags: [Teams]
      operationId: getTeamBilling
      parameters:
        - $ref: "#/components/parameters/TeamIDPath"
      responses:
        "200":
          description: Team billing.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceBilling"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /teams/{id}/external-teams:
    get:
      tags: [Teams]
      operationId: listExternalTeams
      parameters:
        - $ref: "#/components/parameters/TeamIDPath"
      responses:
        "200":
          description: External team connections.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExternalTeamsCollection"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /teams/{id}/external-teams/{external_team_id}:
    delete:
      tags: [Teams]
      operationId: disconnectExternalTeam
      parameters:
        - $ref: "#/components/parameters/TeamIDPath"
        - $ref: "#/components/parameters/ExternalTeamIDPath"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /teams/{id}/integration-logs:
    get:
      tags: [Teams]
      operationId: listTeamIntegrationLogs
      parameters:
        - $ref: "#/components/parameters/TeamIDPath"
        - $ref: "#/components/parameters/LimitQuery"
      responses:
        "200":
          description: Team integration logs.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceIntegrationLogsCollection"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /teams/{id}/primary-admin:
    post:
      tags: [Teams]
      operationId: transferPrimaryAdmin
      parameters:
        - $ref: "#/components/parameters/TeamIDPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransferPrimaryAdminRequest"
      responses:
        "200":
          description: Updated primary admin.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /teams/{id}/preferences:
    get:
      tags: [Teams]
      operationId: getTeamPreferences
      parameters:
        - $ref: "#/components/parameters/TeamIDPath"
      responses:
        "200":
          description: Team preferences.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FreeFormObject"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /teams/{id}/profile-fields:
    get:
      tags: [Teams]
      operationId: listTeamProfileFields
      parameters:
        - $ref: "#/components/parameters/TeamIDPath"
      responses:
        "200":
          description: Team profile fields.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceProfileFieldsCollection"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /users:
    get:
      tags: [Users]
      operationId: listUsers
      parameters:
        - $ref: "#/components/parameters/TeamIDQuery"
        - $ref: "#/components/parameters/CursorQuery"
        - $ref: "#/components/parameters/LimitQuery"
        - name: email
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Users.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsersCollection"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
    post:
      tags: [Users]
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created.
          headers:
            Location:
              $ref: "#/components/headers/Location"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /users/{id}:
    get:
      tags: [Users]
      operationId: getUser
      parameters:
        - $ref: "#/components/parameters/UserIDPath"
      responses:
        "200":
          description: User.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
    patch:
      tags: [Users]
      operationId: updateUser
      parameters:
        - $ref: "#/components/parameters/UserIDPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: User updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /users/{id}/roles:
    get:
      tags: [Users]
      operationId: getUserRoles
      parameters:
        - $ref: "#/components/parameters/UserIDPath"
      responses:
        "200":
          description: Delegated roles for the user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserRolesResponse"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
    put:
      tags: [Users]
      operationId: updateUserRoles
      parameters:
        - $ref: "#/components/parameters/UserIDPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRolesRequest"
      responses:
        "200":
          description: Delegated roles updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserRolesResponse"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /external-principal-access:
    get:
      tags: [Access]
      operationId: listExternalPrincipalAccess
      parameters:
        - name: host_team_id
          in: query
          schema:
            type: string
      responses:
        "200":
          description: External principal access grants.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExternalPrincipalAccessCollection"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
    post:
      tags: [Access]
      operationId: createExternalPrincipalAccess
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExternalPrincipalAccessRequest"
      responses:
        "201":
          description: External principal access granted.
          headers:
            Location:
              $ref: "#/components/headers/Location"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExternalPrincipalAccess"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /external-principal-access/{id}:
    get:
      tags: [Access]
      operationId: getExternalPrincipalAccess
      parameters:
        - $ref: "#/components/parameters/ExternalPrincipalAccessIDPath"
      responses:
        "200":
          description: External principal access grant.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExternalPrincipalAccess"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
    patch:
      tags: [Access]
      operationId: updateExternalPrincipalAccess
      parameters:
        - $ref: "#/components/parameters/ExternalPrincipalAccessIDPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateExternalPrincipalAccessRequest"
      responses:
        "200":
          description: External principal access updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExternalPrincipalAccess"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
    delete:
      tags: [Access]
      operationId: deleteExternalPrincipalAccess
      parameters:
        - $ref: "#/components/parameters/ExternalPrincipalAccessIDPath"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /conversations:
    get:
      tags: [Conversations]
      operationId: listConversations
      parameters:
        - $ref: "#/components/parameters/TeamIDQuery"
        - $ref: "#/components/parameters/CursorQuery"
        - $ref: "#/components/parameters/LimitQuery"
        - name: types
          in: query
          style: form
          explode: false
          schema:
            type: array
            items:
              $ref: "#/components/schemas/ConversationType"
        - name: exclude_archived
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Conversations.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationsCollection"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
    post:
      tags: [Conversations]
      operationId: createConversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConversationRequest"
      responses:
        "201":
          description: Conversation created.
          headers:
            Location:
              $ref: "#/components/headers/Location"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /conversations/{id}:
    get:
      tags: [Conversations]
      operationId: getConversation
      parameters:
        - $ref: "#/components/parameters/ConversationIDPath"
      responses:
        "200":
          description: Conversation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
    patch:
      tags: [Conversations]
      operationId: updateConversation
      parameters:
        - $ref: "#/components/parameters/ConversationIDPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConversationUpdateRequest"
      responses:
        "200":
          description: Conversation updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /conversations/{id}/members:
    get:
      tags: [Conversations]
      operationId: listConversationMembers
      parameters:
        - $ref: "#/components/parameters/ConversationIDPath"
        - $ref: "#/components/parameters/CursorQuery"
        - $ref: "#/components/parameters/LimitQuery"
      responses:
        "200":
          description: Conversation member ids.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StringsCollection"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
    post:
      tags: [Conversations]
      operationId: addConversationMembers
      parameters:
        - $ref: "#/components/parameters/ConversationIDPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConversationInviteRequest"
      responses:
        "200":
          description: Conversation membership updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /conversations/{id}/members/{user_id}:
    delete:
      tags: [Conversations]
      operationId: removeConversationMember
      parameters:
        - $ref: "#/components/parameters/ConversationIDPath"
        - $ref: "#/components/parameters/UserIDPathNamed"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /conversations/{id}/managers:
    get:
      tags: [Conversations]
      operationId: getConversationManagers
      parameters:
        - $ref: "#/components/parameters/ConversationIDPath"
      responses:
        "200":
          description: Conversation managers.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationManagersResponse"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
    put:
      tags: [Conversations]
      operationId: updateConversationManagers
      parameters:
        - $ref: "#/components/parameters/ConversationIDPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConversationManagersUpdateRequest"
      responses:
        "200":
          description: Conversation managers updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationManagersResponse"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /conversations/{id}/posting-policy:
    get:
      tags: [Conversations]
      operationId: getConversationPostingPolicy
      parameters:
        - $ref: "#/components/parameters/ConversationIDPath"
      responses:
        "200":
          description: Conversation posting policy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationPostingPolicyResponse"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
    put:
      tags: [Conversations]
      operationId: updateConversationPostingPolicy
      parameters:
        - $ref: "#/components/parameters/ConversationIDPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConversationPostingPolicyUpdateRequest"
      responses:
        "200":
          description: Conversation posting policy updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationPostingPolicyResponse"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /conversations/{id}/read-state:
    put:
      tags: [Conversations]
      operationId: updateConversationReadState
      parameters:
        - $ref: "#/components/parameters/ConversationIDPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConversationReadUpdateRequest"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /conversations/{id}/pins:
    get:
      tags: [Conversations]
      operationId: listPins
      parameters:
        - $ref: "#/components/parameters/ConversationIDPath"
      responses:
        "200":
          description: Pins.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PinsCollection"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
    post:
      tags: [Conversations]
      operationId: createPin
      parameters:
        - $ref: "#/components/parameters/ConversationIDPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PinCreateRequest"
      responses:
        "201":
          description: Pin created.
          headers:
            Location:
              $ref: "#/components/headers/Location"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pin"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /conversations/{id}/pins/{message_ts}:
    delete:
      tags: [Conversations]
      operationId: deletePin
      parameters:
        - $ref: "#/components/parameters/ConversationIDPath"
        - $ref: "#/components/parameters/MessageTSPath"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /conversations/{id}/bookmarks:
    get:
      tags: [Conversations]
      operationId: listBookmarks
      parameters:
        - $ref: "#/components/parameters/ConversationIDPath"
      responses:
        "200":
          description: Bookmarks.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookmarksCollection"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
    post:
      tags: [Conversations]
      operationId: createBookmark
      parameters:
        - $ref: "#/components/parameters/ConversationIDPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookmarkRequest"
      responses:
        "201":
          description: Bookmark created.
          headers:
            Location:
              $ref: "#/components/headers/Location"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bookmark"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /conversations/{conversation_id}/bookmarks/{bookmark_id}:
    patch:
      tags: [Conversations]
      operationId: updateBookmark
      parameters:
        - $ref: "#/components/parameters/ConversationIDPathNamed"
        - $ref: "#/components/parameters/BookmarkIDPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookmarkUpdateRequest"
      responses:
        "200":
          description: Bookmark updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bookmark"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
    delete:
      tags: [Conversations]
      operationId: deleteBookmark
      parameters:
        - $ref: "#/components/parameters/ConversationIDPathNamed"
        - $ref: "#/components/parameters/BookmarkIDPath"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /messages:
    get:
      tags: [Messages]
      operationId: listMessages
      parameters:
        - name: conversation_id
          in: query
          schema:
            type: string
        - name: thread_ts
          in: query
          schema:
            type: string
        - name: latest
          in: query
          schema:
            type: string
        - name: oldest
          in: query
          schema:
            type: string
        - name: inclusive
          in: query
          schema:
            type: boolean
        - name: include_all_metadata
          in: query
          schema:
            type: boolean
        - $ref: "#/components/parameters/CursorQuery"
        - $ref: "#/components/parameters/LimitQuery"
      responses:
        "200":
          description: Messages.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessagesCollection"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
    post:
      tags: [Messages]
      operationId: createMessage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostMessageRequest"
      responses:
        "201":
          description: Message created.
          headers:
            Location:
              $ref: "#/components/headers/Location"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /messages/{conversation_id}/{message_ts}:
    patch:
      tags: [Messages]
      operationId: updateMessage
      parameters:
        - $ref: "#/components/parameters/ConversationIDPathNamed"
        - $ref: "#/components/parameters/MessageTSPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMessageRequest"
      responses:
        "200":
          description: Message updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
    delete:
      tags: [Messages]
      operationId: deleteMessage
      parameters:
        - $ref: "#/components/parameters/ConversationIDPathNamed"
        - $ref: "#/components/parameters/MessageTSPath"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /messages/{conversation_id}/{message_ts}/reactions:
    get:
      tags: [Messages]
      operationId: listMessageReactions
      parameters:
        - $ref: "#/components/parameters/ConversationIDPathNamed"
        - $ref: "#/components/parameters/MessageTSPath"
      responses:
        "200":
          description: Message reactions.
          content:
