          type: array
          items:
            $ref: "#/components/schemas/DelegatedRole"
        allowed_user_ids:
          type: array
          items:
            type: string
    ConversationReadUpdateRequest:
      type: object
      required: [last_read_ts]
      properties:
        last_read_ts:
          type: string
          description: Timestamp of the last message the user has read.
    PostMessageRequest:
      type: object
      required: [channel_id, user_id, text]
      properties:
        channel_id:
          type: string
          description: Conversation to post the message in.
        user_id:
          type: string
          description: User sending the message.
        text:
          type: string
          description: Plain-text content of the message.
        thread_ts:
          type: string
          description: Parent message timestamp to reply in a thread.
        blocks:
          $ref: "#/components/schemas/FreeFormJSON"
          description: Rich-text block layout (Block Kit format).
        metadata:
          $ref: "#/components/schemas/FreeFormJSON"
          description: Arbitrary key-value metadata to attach to the message.
        reply_broadcast:
          type: boolean
          description: When true, also post the reply to the channel (not just the thread).
    UpdateMessageRequest:
      type: object
      properties:
        text:
          type: string
          description: New plain-text content.
        blocks:
          $ref: "#/components/schemas/FreeFormJSON"
          description: New rich-text block layout.
        metadata:
          $ref: "#/components/schemas/FreeFormJSON"
          description: New metadata (replaces existing metadata entirely).
    MessageReactionRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          description: Emoji name to react with (e.g. "thumbsup").
        user_id:
          type: string
          description: User adding the reaction. Defaults to the authenticated user.
    GetUploadURLRequest:
      type: object
      required: [filename, length]
      properties:
        filename:
          type: string
          description: Name of the file being uploaded.
        length:
          type: integer
          format: int64
          description: File size in bytes.
        channel_id:
          type: string
          description: Conversation the uploaded file will be shared into. Required for external shared uploads.
    GetUploadURLResponse:
      type: object
      required: [upload_url, file_id]
      properties:
        upload_url:
          type: string
          description: Pre-signed URL to upload the file content via PUT.
        file_id:
          type: string
          description: File identifier to use when completing the upload.
    CompleteUploadRequest:
      type: object
      properties:
        file_id:
          type: string
          description: File identifier returned from the upload URL request.
        title:
          type: string
          description: Display title for the file.
        channel_id:
          type: string
          description: Conversation to share the file in after upload.
        thread_ts:
          type: string
          description: Thread to share the file in (if sharing in a thread).
    AddRemoteFileRequest:
      type: object
      required: [title, external_url, filetype]
      properties:
        title:
          type: string
          description: Display title for the remote file.
        external_url:
          type: string
          description: URL where the file is hosted.
        filetype:
          type: string
          description: File type identifier (e.g. "pdf", "png").
        user_id:
          type: string
          description: User adding the file. Defaults to the authenticated user.
        channel_id:
          type: string
          description: Conversation to share the remote file into immediately. Required for external shared writes.
    ShareRemoteFileRequest:
      type: object
      required: [channels]
      properties:
        file_id:
          type: string
          description: File identifier to share.
        channels:
          type: array
          description: Conversation IDs to share the file in.
          items:
            type: string
    CreateEventSubscriptionRequest:
      type: object
      required: [workspace_id, url, secret]
      properties:
        workspace_id:
          type: string
          description: Workspace to subscribe to events for.
        url:
          type: string
          description: HTTPS URL where events will be delivered via POST.
        type:
          type: string
          description: Filter to a specific event type. Omit to receive all types.
        resource_type:
          type: string
          description: Filter events to a specific resource type.
          enum: [workspace, user, conversation, file]
        resource_id:
          type: string
          description: Filter events to a specific resource instance.
        secret:
          type: string
          description: Shared secret used to compute the HMAC-SHA256 signature on each delivery.
    EventSubscriptionUpdateRequest:
      type: object
      properties:
        url:
          type: string
          description: New delivery URL.
        type:
          type: string
          description: New event type filter.
        resource_type:
          type: string
          description: New resource type filter.
          enum: [workspace, user, conversation, file]
        resource_id:
          type: string
          description: New resource ID filter.
        enabled:
          type: boolean
          description: Set to false to pause deliveries without deleting the subscription.
    SearchRequest:
      type: object
      required: [workspace_id, query]
      properties:
        workspace_id:
          type: string
          description: Workspace to search within.
        query:
          type: string
          description: Free-text search query.
        types:
          type: array
          description: Restrict results to specific resource types (e.g. ["message", "user"]).
          items:
            type: string
        limit:
          type: integer
          format: int32
          description: Maximum number of results to return.
        cursor:
          type: string
          description: Pagination cursor from a previous search response.
    CreateAPIKeyRequest:
      type: object
      required: [name, workspace_id]
      properties:
        name:
          type: string
          description: Human-readable name for the key.
        description:
          type: string
          description: Optional longer description of the key's purpose.
        workspace_id:
          type: string
          description: Workspace to scope this key to.
        user_id:
          type: string
          description: User this key acts on behalf of. Omit for workspace-level keys.
        created_by:
          type: string
          description: User creating the key. Defaults to the authenticated user.
        permissions:
          type: array
          description: Permission strings to grant (e.g. "messages:write", "conversations:read"). Omit for full access.
          items:
            type: string
        expires_in:
          type: string
          description: Duration until expiration (e.g. "30d", "24h"). Omit for no expiration.
    UpdateAPIKeyRequest:
      type: object
      properties:
        name:
          type: string
          description: New name.
        description:
          type: string
          description: New description.
        permissions:
          type: array
          description: New permission set (replaces existing permissions entirely).
          items:
            type: string
    RotateAPIKeyRequest:
      type: object
      properties:
        grace_period:
          type: string
          description: Duration the old key remains valid after rotation (e.g. "1h", "24h"). Defaults to immediate revocation.
    APIKeySecretResponse:
      type: object
      description: Returned when a key is created or rotated. The secret is only shown once.
      required: [api_key, secret]
      properties:
        api_key:
          $ref: "#/components/schemas/APIKey"
        secret:
          type: string
          description: The full API key secret. Store this securely — it cannot be retrieved again.
