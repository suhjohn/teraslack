openapi: 3.0.3
info:
  title: Teraslack Messaging API
  version: 0.1.0
  description: Canonical HTTP API contract for the Teraslack server.
servers:
  - url: http://localhost:8080
security:
  - bearerAuth: []
tags:
  - name: Health
    description: Check whether the API is responding.
  - name: Auth
    description: Start or complete sign-in flows and manage the current session.
  - name: Profile
    description: View or update the signed-in user's account details.
  - name: Agents
    description: Create and manage agent principals owned by a user or workspace.
  - name: API Keys
    description: Create, list, and revoke personal or workspace API keys.
  - name: Search
    description: Search messages, conversations, workspaces, users, and events you can access.
  - name: Workspaces
    description: Create workspaces, manage members, and handle invites.
  - name: Conversations
    description: Create conversations, manage participants, and handle share links.
  - name: Messages
    description: Send, edit, list, and delete messages.
  - name: Events
    description: Browse the external event feed available to the caller.
  - name: Event Subscriptions
    description: Manage signed webhook subscriptions for external events.
paths:
  /healthz:
    get:
      tags:
        - Health
      operationId: getHealth
      summary: Check whether the API is up
      description: Returns a simple liveness response for the current server instance.
      security: []
      responses:
        '200':
          description: Server health status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericStatusResponse'
        default:
          $ref: '#/components/responses/ApiErrorResponse'
  /auth/email/start:
    post:
      tags:
        - Auth
      operationId: startEmailLogin
      summary: Send an email sign-in code
      description: Sends a one-time verification code to the email address you provide.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartEmailLoginRequest'
      responses:
        '202':
          description: Verification email queued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericStatusResponse'
        default:
          $ref: '#/components/responses/ApiErrorResponse'
  /auth/email/verify:
    post:
      tags:
        - Auth
      operationId: verifyEmailLogin
      summary: Sign in with an email code
      description: Exchanges an email address and verification code for a session and authenticated user payload.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmailLoginRequest'
      responses:
        '200':
          description: Session created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        default:
          $ref: '#/components/responses/ApiErrorResponse'
  /auth/oauth/google/start:
    post:
      tags:
        - Auth
      operationId: startGoogleOAuth
      summary: Start Google sign-in
      description: Creates an OAuth state record and returns the Google authorization URL to open in the browser.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OAuthStartRequest'
      responses:
        '200':
          description: OAuth authorization URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthStartResponse'
        default:
          $ref: '#/components/responses/ApiErrorResponse'
  /auth/oauth/google/callback:
    get:
      tags:
        - Auth
      operationId: completeGoogleOAuth
      summary: Finish Google sign-in
      description: Completes the Google OAuth flow using the provider callback code and state.
      security: []
      parameters:
        - $ref: '#/components/parameters/OAuthCodeQuery'
        - $ref: '#/components/parameters/OAuthStateQuery'
      responses:
        '200':
          description: Session created when no redirect URI was supplied during OAuth start.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '302':
          description: Redirect to the client-provided redirect URI after successful sign-in.
        default:
          $ref: '#/components/responses/ApiErrorResponse'
  /auth/oauth/github/start:
    post:
      tags:
        - Auth
      operationId: startGitHubOAuth
      summary: Start GitHub sign-in
      description: Creates an OAuth state record and returns the GitHub authorization URL to open in the browser.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OAuthStartRequest'
      responses:
        '200':
          description: OAuth authorization URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthStartResponse'
        default:
          $ref: '#/components/responses/ApiErrorResponse'
  /auth/oauth/github/callback:
    get:
      tags:
        - Auth
      operationId: completeGitHubOAuth
      summary: Finish GitHub sign-in
      description: Completes the GitHub OAuth flow using the provider callback code and state.
      security: []
      parameters:
        - $ref: '#/components/parameters/OAuthCodeQuery'
        - $ref: '#/components/parameters/OAuthStateQuery'
      responses:
        '200':
          description: Session created when no redirect URI was supplied during OAuth start.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '302':
          description: Redirect to the client-provided redirect URI after successful sign-in.
        default:
          $ref: '#/components/responses/ApiErrorResponse'
  /auth/sessions/current:
    delete:
      tags:
        - Auth
      operationId: revokeCurrentSession
      summary: Sign out the current session
      description: Revokes the current browser or bearer session. This endpoint requires a session credential rather than an API key.
      responses:
        '204':
          description: Session revoked.
        default:
          $ref: '#/components/responses/ApiErrorResponse'
  /me:
    get:
      tags:
        - Profile
      operationId: getProfile
      summary: Show your account and workspaces
      description: Returns the signed-in user and the workspaces they can currently access.
      responses:
        '200':
          description: Current caller bootstrap state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        default:
          $ref: '#/components/responses/ApiErrorResponse'
  /me/profile:
    patch:
      tags:
        - Profile
      operationId: updateProfile
      summary: Update your profile
      description: Updates the signed-in user's handle, display name, avatar URL, or bio.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Updated user profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        default:
          $ref: '#/components/responses/ApiErrorResponse'
  /agents:
    get:
      tags:
        - Agents
      operationId: listAgents
      summary: List manageable agents
      description: Returns agents owned directly by the current user or by workspaces where the current user is an owner or admin.
      responses:
        '200':
          description: Manageable agents.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentsCollection'
        default:
          $ref: '#/components/responses/ApiErrorResponse'
    post:
      tags:
        - Agents
      operationId: createAgent
      summary: Create an agent
      description: Creates a first-class agent user owned either by the current user or by one workspace the current user administers.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAgentRequest'
      responses:
        '201':
          description: Agent created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
        default:
          $ref: '#/components/responses/ApiErrorResponse'
  /agents/{agent_id}:
    get:
      tags:
        - Agents
      operationId: getAgent
      summary: Show an agent
      description: Returns one manageable agent by its user identifier.
      parameters:
        - $ref: '#/components/parameters/AgentIDPath'
      responses:
        '200':
          description: Agent details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
        default:
          $ref: '#/components/responses/ApiErrorResponse'
    patch:
      tags:
        - Agents
      operationId: updateAgent
      summary: Update an agent
      description: Updates a manageable agent's profile, mode, or status.
      parameters:
        - $ref: '#/components/parameters/AgentIDPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAgentRequest'
      responses:
        '200':
          description: Updated agent.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
        default:
          $ref: '#/components/responses/ApiErrorResponse'
  /api-keys:
    get:
      tags:
        - API Keys
      operationId: listApiKeys
      summary: List your API keys
      description: Returns API keys owned by the current user or by one manageable agent. Workspace-scoped API keys cannot access this global user surface.
      parameters:
        - $ref: '#/components/parameters/SubjectUserIDQuery'
      responses:
        '200':
          description: API keys owned by the selected subject user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIKeysCollection'
        default:
          $ref: '#/components/responses/ApiErrorResponse'
    post:
      tags:
        - API Keys
      operationId: createApiKey
      summary: Create an API key
      description: Creates a personal or workspace-scoped API key for the current user or one manageable agent and returns the secret once.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAPIKeyRequest'
      responses:
        '201':
          description: API key created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateAPIKeyResponse'
        default:
          $ref: '#/components/responses/ApiErrorResponse'
  /api-keys/{key_id}:
    delete:
      tags:
        - API Keys
      operationId: deleteApiKey
      summary: Revoke an API key
      description: Revokes one API key owned by the current user or one manageable agent.
      parameters:
        - $ref: '#/components/parameters/KeyIDPath'
      responses:
        '204':
          description: API key revoked.
        default:
          $ref: '#/components/responses/ApiErrorResponse'
  /search:
    post:
      tags:
        - Search
      operationId: runSearch
      summary: Search the resources you can access
      description: Runs search across the messages, conversations, workspaces, users, and events visible to the caller.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchRequest'
      responses:
        '200':
          description: Search results.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        default:
          $ref: '#/components/responses/ApiErrorResponse'
  /workspaces:
    get:
      tags:
        - Workspaces
      operationId: listWorkspaces
      summary: List your workspaces
      description: Returns workspaces visible to the caller. Workspace-scoped API keys return only their bound workspace.
      responses:
        '200':
          description: Accessible workspaces.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspacesCollection'
        default:
          $ref: '#/components/responses/ApiErrorResponse'
    post:
      tags:
        - Workspaces
      operationId: createWorkspace
      summary: Create a workspace
      description: Creates a workspace, makes the caller its owner, and provisions the default general conversation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkspaceRequest'
      responses:
        '201':
          description: Workspace created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspace'
        default:
          $ref: '#/components/responses/ApiErrorResponse'
  /workspaces/{workspace_id}:
    get:
      tags:
        - Workspaces
      operationId: getWorkspace
      summary: Show a workspace
      description: Returns one workspace visible to the caller.
      parameters:
        - $ref: '#/components/parameters/WorkspaceIDPath'
      responses:
        '200':
          description: Workspace details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspace'
        default:
          $ref: '#/components/responses/ApiErrorResponse'
    patch:
      tags:
        - Workspaces
      operationId: updateWorkspace
      summary: Update a workspace
      description: Updates a workspace name or slug. The caller must be a workspace owner or admin.
      parameters:
        - $ref: '#/components/parameters/WorkspaceIDPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWorkspaceRequest'
      responses:
        '200':
          description: Updated workspace.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspace'
        default:
          $ref: '#/components/responses/ApiErrorResponse'
  /workspaces/{workspace_id}/members:
    get:
      tags:
        - Workspaces
      operationId: listWorkspaceMembers
      summary: List workspace members
      description: Returns members of a workspace visible to the caller.
      parameters:
        - $ref: '#/components/parameters/WorkspaceIDPath'
      responses:
        '200':
          description: Workspace members.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceMembersCollection'
        default:
          $ref: '#/components/responses/ApiErrorResponse'
  /workspaces/{workspace_id}/invites:
    post:
      tags:
        - Workspaces
      operationId: createWorkspaceInvite
      summary: Create a workspace invite
      description: Creates a workspace invite token that can optionally be restricted to one email address or one existing user.
      parameters:
        - $ref: '#/components/parameters/WorkspaceIDPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkspaceInviteRequest'
      responses:
        '201':
          description: Workspace invite created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateWorkspaceInviteResponse'
        default:
          $ref: '#/components/responses/ApiErrorResponse'
  /workspace-invites/{token}/accept:
    post:
      tags:
        - Workspaces
      operationId: acceptWorkspaceInvite
      summary: Join a workspace from an invite
      description: Accepts a workspace invite token for the signed-in user or agent principal.
      parameters:
        - $ref: '#/components/parameters/WorkspaceInviteTokenPath'
      responses:
        '200':
          description: Accepted workspace membership.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceMember'
        default:
          $ref: '#/components/responses/ApiErrorResponse'
  /workspaces/{workspace_id}/members/{user_id}:
    patch:
      tags:
        - Workspaces
      operationId: updateWorkspaceMember
      summary: Update a workspace member
      description: Updates a workspace member's role or status. The caller must be a workspace owner or admin.
      parameters:
        - $ref: '#/components/parameters/WorkspaceIDPath'
        - $ref: '#/components/parameters/UserIDPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWorkspaceMemberRequest'
      responses:
        '200':
          description: Updated workspace member.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceMember'
        default:
          $ref: '#/components/responses/ApiErrorResponse'
  /conversations:
    get:
      tags:
        - Conversations
      operationId: listConversations
      summary: List conversations
      description: Returns conversations visible to the caller. Global results include only globally visible conversations; workspace results include conversations inside one workspace.
      parameters:
        - $ref: '#/components/parameters/WorkspaceIDQuery'
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/CursorQuery'
        - $ref: '#/components/parameters/AccessPolicyQuery'
      responses:
        '200':
          description: Visible conversations.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationsCollection'
        default:
          $ref: '#/components/responses/ApiErrorResponse'
    post:
      tags:
        - Conversations
      operationId: createConversation
      summary: Create a conversation
      description: Creates a conversation. For global two-person direct messages, the existing canonical conversation is returned instead of creating a duplicate.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConversationRequest'
      responses:
        '200':
          description: Existing canonical direct message returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conversation'
        '201':
          description: Conversation created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conversation'
        default:
          $ref: '#/components/responses/ApiErrorResponse'
  /conversations/{conversation_id}:
    get:
      tags:
        - Conversations
      operationId: getConversation
      summary: Show a conversation
      description: Returns one conversation visible to the caller.
      parameters:
        - $ref: '#/components/parameters/ConversationIDPath'
      responses:
        '200':
          description: Conversation details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conversation'
        default:
          $ref: '#/components/responses/ApiErrorResponse'
    patch:
      tags:
        - Conversations
      operationId: updateConversation
      summary: Update a conversation
      description: Updates a conversation title, description, or archived state. The caller must be allowed to manage the conversation.
      parameters:
        - $ref: '#/components/parameters/ConversationIDPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateConversationRequest'
      responses:
        '200':
          description: Updated conversation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conversation'
        default:
          $ref: '#/components/responses/ApiErrorResponse'
  /conversations/{conversation_id}/share-link:
    get:
      tags:
        - Conversations
      operationId: getConversationShareLink
      summary: Show the current conversation share link
      description: Returns the current share link for one member-only non-DM conversation. If none exists yet, one is created.
      parameters:
        - $ref: '#/components/parameters/ConversationIDPath'
      responses:
        '200':
          description: Current conversation share link.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationShareLink'
        default:
          $ref: '#/components/responses/ApiErrorResponse'
  /conversations/{conversation_id}/share-link/rotate:
    post:
      tags:
        - Conversations
      operationId: rotateConversationShareLink
      summary: Rotate the conversation share link
      description: Revokes the current share link for one member-only non-DM conversation and returns a replacement.
      parameters:
        - $ref: '#/components/parameters/ConversationIDPath'
      responses:
        '200':
          description: Replacement conversation share link.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationShareLink'
        default:
          $ref: '#/components/responses/ApiErrorResponse'
  /conversations/join:
    post:
      tags:
        - Conversations
      operationId: joinConversation
      summary: Join a conversation from a share link
      description: Accepts a conversation share link token for the signed-in user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JoinConversationRequest'
      responses:
        '200':
          description: Updated conversation after joining by share link.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conversation'
        default:
          $ref: '#/components/responses/ApiErrorResponse'
  /conversations/{conversation_id}/participants:
    get:
      tags:
        - Conversations
      operationId: listConversationParticipants
      summary: List conversation participants
      description: Returns participants for a member-only conversation. Non-member conversations return an empty list.
      parameters:
        - $ref: '#/components/parameters/ConversationIDPath'
      responses:
        '200':
          description: Conversation participants.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsersCollection'
        default:
          $ref: '#/components/responses/ApiErrorResponse'
    post:
      tags:
        - Conversations
      operationId: addConversationParticipants
      summary: Add conversation participants
      description: Adds users to a member-only conversation. Canonical direct messages cannot be changed.
      parameters:
        - $ref: '#/components/parameters/ConversationIDPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddParticipantsRequest'
      responses:
        '200':
          description: Updated participant list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsersCollection'
        default:
          $ref: '#/components/responses/ApiErrorResponse'
  /conversations/{conversation_id}/participants/{user_id}:
    delete:
      tags:
        - Conversations
      operationId: removeConversationParticipant
      summary: Remove a conversation participant
      description: Removes one participant from a member-only conversation. Canonical direct messages cannot be changed.
      parameters:
        - $ref: '#/components/parameters/ConversationIDPath'
        - $ref: '#/components/parameters/UserIDPath'
      responses:
        '204':
          description: Participant removed.
        default:
          $ref: '#/components/responses/ApiErrorResponse'
  /conversations/{conversation_id}/messages:
    get:
      tags:
        - Messages
      operationId: listMessages
      summary: List messages
      description: Returns messages in one conversation in reverse chronological order.
      parameters:
        - $ref: '#/components/parameters/ConversationIDPath'
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/CursorQuery'
        - $ref: '#/components/parameters/BeforeMessageIDQuery'
      responses:
        '200':
          description: Conversation messages.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessagesCollection'
        default:
          $ref: '#/components/responses/ApiErrorResponse'
    post:
      tags:
        - Messages
      operationId: createMessage
      summary: Send a message
      description: Posts a message to a conversation visible to the caller.
      parameters:
        - $ref: '#/components/parameters/ConversationIDPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMessageRequest'
      responses:
        '201':
          description: Message created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        default:
          $ref: '#/components/responses/ApiErrorResponse'
  /messages/{message_id}:
    patch:
      tags:
        - Messages
      operationId: updateMessage
      summary: Update a message
      description: Updates a message authored by the signed-in user.
      parameters:
        - $ref: '#/components/parameters/MessageIDPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMessageRequest'
      responses:
        '200':
          description: Updated message.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        default:
          $ref: '#/components/responses/ApiErrorResponse'
    delete:
      tags:
        - Messages
      operationId: deleteMessage
      summary: Delete a message
      description: Soft-deletes a message authored by the signed-in user.
      parameters:
        - $ref: '#/components/parameters/MessageIDPath'
      responses:
        '204':
          description: Message deleted.
        default:
          $ref: '#/components/responses/ApiErrorResponse'
  /conversations/{conversation_id}/read-state:
    put:
      tags:
        - Conversations
      operationId: markConversationRead
      summary: Mark a conversation as read
      description: Marks a conversation read through one message in that conversation.
      parameters:
        - $ref: '#/components/parameters/ConversationIDPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateReadStateRequest'
      responses:
        '204':
          description: Read state updated.
        default:
          $ref: '#/components/responses/ApiErrorResponse'
  /events:
    get:
      tags:
        - Events
      operationId: listEvents
      summary: List external events
      description: Returns external events visible to the caller. Results are paginated by cursor and can be filtered by workspace, event type, or resource.
      parameters:
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/CursorQuery'
        - $ref: '#/components/parameters/EventTypeQuery'
        - $ref: '#/components/parameters/EventResourceTypeQuery'
        - $ref: '#/components/parameters/EventResourceIDQuery'
        - $ref: '#/components/parameters/WorkspaceIDQuery'
      responses:
        '200':
          description: External events.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExternalEventsCollection'
        default:
          $ref: '#/components/responses/ApiErrorResponse'
  /event-subscriptions:
    get:
      tags:
        - Event Subscriptions
      operationId: listEventSubscriptions
      summary: List webhook subscriptions
      description: Returns webhook subscriptions owned by the caller. Workspace-scoped API keys are limited to their bound workspace.
      responses:
        '200':
          description: Event subscriptions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventSubscriptionsCollection'
        default:
          $ref: '#/components/responses/ApiErrorResponse'
    post:
      tags:
        - Event Subscriptions
      operationId: createEventSubscription
      summary: Create a webhook subscription
      description: Creates a signed webhook subscription for events visible to the caller.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEventSubscriptionRequest'
      responses:
        '201':
          description: Event subscription created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventSubscription'
        default:
          $ref: '#/components/responses/ApiErrorResponse'
  /event-subscriptions/{subscription_id}:
    patch:
      tags:
        - Event Subscriptions
      operationId: updateEventSubscription
      summary: Update a webhook subscription
      description: Enables or disables a webhook subscription owned by the caller.
      parameters:
        - $ref: '#/components/parameters/SubscriptionIDPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEventSubscriptionRequest'
      responses:
        '200':
          description: Updated event subscription.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventSubscription'
        default:
          $ref: '#/components/responses/ApiErrorResponse'
    delete:
      tags:
        - Event Subscriptions
      operationId: deleteEventSubscription
      summary: Delete a webhook subscription
      description: Deletes a webhook subscription owned by the caller.
      parameters:
        - $ref: '#/components/parameters/SubscriptionIDPath'
      responses:
        '204':
          description: Event subscription deleted.
        default:
          $ref: '#/components/responses/ApiErrorResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  responses:
    ApiErrorResponse:
      description: Error response.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  parameters:
    KeyIDPath:
      in: path
      name: key_id
      required: true
      description: API key identifier.
      schema:
        type: string
        format: uuid
    AgentIDPath:
      in: path
      name: agent_id
      required: true
      description: Agent user identifier.
      schema:
        type: string
        format: uuid
    WorkspaceIDPath:
      in: path
      name: workspace_id
      required: true
      description: Workspace identifier.
      schema:
        type: string
        format: uuid
    UserIDPath:
      in: path
      name: user_id
      required: true
      description: User identifier.
      schema:
        type: string
        format: uuid
    ConversationIDPath:
      in: path
      name: conversation_id
      required: true
      description: Conversation identifier.
      schema:
        type: string
        format: uuid
    MessageIDPath:
      in: path
      name: message_id
      required: true
      description: Message identifier.
      schema:
        type: string
        format: uuid
    SubscriptionIDPath:
      in: path
      name: subscription_id
      required: true
      description: Event subscription identifier.
      schema:
        type: string
        format: uuid
    WorkspaceInviteTokenPath:
      in: path
      name: token
      required: true
      description: Workspace invite token.
      schema:
        type: string
    OAuthCodeQuery:
      in: query
      name: code
      required: true
      description: Authorization code returned by the OAuth provider.
      schema:
        type: string
    OAuthStateQuery:
      in: query
      name: state
      required: true
      description: OAuth state value returned by the OAuth provider.
      schema:
        type: string
    WorkspaceIDQuery:
      in: query
      name: workspace_id
      required: false
      description: Only include results from one workspace.
      schema:
        type: string
        format: uuid
    SubjectUserIDQuery:
      in: query
      name: subject_user_id
      required: false
      description: User identifier whose API keys should be listed. Defaults to the current user.
      schema:
        type: string
        format: uuid
    LimitQuery:
      in: query
      name: limit
      required: false
      description: Maximum number of items to return per page.
      schema:
        type: integer
        minimum: 1
        maximum: 200
    CursorQuery:
      in: query
      name: cursor
      required: false
      description: Pagination cursor from a previous response.
      schema:
        type: string
    AccessPolicyQuery:
      in: query
      name: access_policy
      required: false
      description: Only include conversations with one access policy.
      schema:
        type: string
        enum:
          - members
          - workspace
    BeforeMessageIDQuery:
      in: query
      name: before_message_id
      required: false
      description: Only return messages created before the referenced message.
      schema:
        type: string
        format: uuid
    EventTypeQuery:
      in: query
      name: type
      required: false
      description: Only include one event type.
      schema:
        type: string
    EventResourceTypeQuery:
      in: query
      name: resource_type
      required: false
      description: Only include events for one resource type.
      schema:
        $ref: '#/components/schemas/EventResourceType'
    EventResourceIDQuery:
      in: query
      name: resource_id
      required: false
      description: Only include one resource id. Requires resource_type.
      schema:
        type: string
        format: uuid
  schemas:
    FreeFormObject:
      type: object
      description: Free-form JSON object.
      additionalProperties: true
    EventResourceType:
      type: string
      description: Public resource scope for external events. Message events are conversation-scoped.
      enum:
        - conversation
        - user
        - workspace
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Stable machine-readable error code.
        message:
          type: string
          description: Human-readable error message.
        request_id:
          type: string
          description: Request identifier for server-side troubleshooting.
        errors:
          type: array
          description: Field-level validation details when request validation fails.
          items:
            $ref: '#/components/schemas/ValidationDetail'
    ValidationDetail:
      type: object
      required:
        - field
        - code
        - message
      properties:
        field:
          type: string
          description: Request field that failed validation.
        code:
          type: string
          description: Stable machine-readable validation error code.
        message:
          type: string
          description: Human-readable validation message.
    SessionEnvelope:
      type: object
      required:
        - token
        - expires_at
      properties:
        token:
          type: string
          description: Bearer session token.
        expires_at:
          type: string
          format: date-time
          description: Session expiration time.
    UserProfile:
      type: object
      required:
        - handle
        - display_name
      properties:
        handle:
          type: string
          description: Public user handle.
        display_name:
          type: string
          description: Human-friendly display name.
        avatar_url:
          type: string
          format: uri
          nullable: true
          description: Avatar image URL.
        bio:
          type: string
          nullable: true
          description: Optional profile bio.
    User:
      type: object
      required:
        - id
        - principal_type
        - status
        - profile
      properties:
        id:
          type: string
          format: uuid
          description: User identifier.
        principal_type:
          type: string
          description: Principal type for the user record.
        status:
          type: string
          description: User status.
        email:
          type: string
          format: email
          nullable: true
          description: Primary email address when available.
        profile:
          $ref: '#/components/schemas/UserProfile'
    Agent:
      type: object
      required:
        - user
        - owner_type
        - mode
        - created_by_user_id
        - created_at
        - updated_at
      properties:
        user:
          $ref: '#/components/schemas/User'
        owner_type:
          type: string
          enum:
            - user
            - workspace
          description: Whether the agent is directly owned by a user or by one workspace.
        owner_user_id:
          type: string
          format: uuid
          nullable: true
          description: Direct owner when owner_type is user.
        owner_workspace_id:
          type: string
          format: uuid
          nullable: true
          description: Owning workspace when owner_type is workspace.
        mode:
          type: string
          enum:
            - read_only
            - safe_write
          description: Effective write mode for API-key-authenticated agent actions.
        created_by_user_id:
          type: string
          format: uuid
          description: User who created the agent.
        created_at:
          type: string
          format: date-time
          description: Creation time.
        updated_at:
          type: string
          format: date-time
          description: Last metadata update time.
    AgentsCollection:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Agent'
        next_cursor:
          type: string
          description: Pagination cursor when additional results are available.
    CreateAgentRequest:
      type: object
      required:
        - display_name
        - owner_type
      properties:
        display_name:
          type: string
          description: Agent display name.
        handle:
          type: string
          nullable: true
          description: Optional public handle. When omitted, the server derives one from display_name.
        avatar_url:
          type: string
          format: uri
          nullable: true
          description: Optional avatar image URL.
        bio:
          type: string
          nullable: true
          description: Optional profile bio.
        owner_type:
          type: string
          enum:
            - user
            - workspace
          description: Ownership model for the new agent.
        owner_workspace_id:
          type: string
          format: uuid
          nullable: true
          description: Required when owner_type is workspace. Must be omitted for user-owned agents.
        mode:
          type: string
          enum:
            - read_only
            - safe_write
          default: safe_write
          description: Initial write mode for the agent. Defaults to safe_write when omitted.
    UpdateAgentRequest:
      type: object
      properties:
        display_name:
          type: string
          description: Updated display name.
        handle:
          type: string
          description: Updated public handle.
        avatar_url:
          type: string
          format: uri
          nullable: true
          description: Updated avatar URL or null to clear it.
        bio:
          type: string
          nullable: true
          description: Updated bio or null to clear it.
        mode:
          type: string
          enum:
            - read_only
            - safe_write
          description: Updated write mode.
        status:
          type: string
          enum:
            - active
            - suspended
          description: Updated user status for the agent.
    WorkspaceMembershipSummary:
      type: object
      required:
        - workspace_id
        - role
        - status
        - name
      properties:
        workspace_id:
          type: string
          format: uuid
          description: Workspace identifier.
        role:
          type: string
          enum:
            - owner
            - admin
            - member
          description: Role held in the workspace.
        status:
          type: string
          enum:
            - invited
            - active
            - suspended
            - removed
          description: Membership status in the workspace.
        name:
          type: string
          description: Workspace display name.
    MeResponse:
      type: object
      required:
        - user
        - workspaces
      properties:
        user:
          $ref: '#/components/schemas/User'
        workspaces:
          type: array
          description: Workspace memberships visible to the caller.
          items:
            $ref: '#/components/schemas/WorkspaceMembershipSummary'
    UpdateProfileRequest:
      type: object
      description: Fields to update on the authenticated caller's profile.
      properties:
        handle:
          type: string
          description: New public handle. Empty values are rejected.
        display_name:
          type: string
          description: New display name. Blank values clear the field server-side only when supported.
        avatar_url:
          type: string
          format: uri
          nullable: true
          description: New avatar URL or null to clear it.
        bio:
          type: string
          nullable: true
          description: New bio or null to clear it.
    StartEmailLoginRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
          description: Email address to receive a verification code.
    VerifyEmailLoginRequest:
      type: object
      required:
        - email
        - code
      properties:
        email:
          type: string
          format: email
          description: Email address used to start sign-in.
        code:
          type: string
          description: Verification code delivered by email.
    OAuthStartRequest:
      type: object
      required:
        - redirect_uri
      properties:
        redirect_uri:
          type: string
          format: uri
          description: Client URI to redirect to after OAuth completes successfully.
    OAuthStartResponse:
      type: object
      required:
        - auth_url
        - state
      properties:
        auth_url:
          type: string
          format: uri
          description: Provider authorization URL to open in the browser.
        state:
          type: string
          description: OAuth state value associated with the authorization request.
    GenericStatusResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          description: Simple status string.
    AuthResponse:
      type: object
      required:
        - session
        - user
      properties:
        session:
          $ref: '#/components/schemas/SessionEnvelope'
        user:
          $ref: '#/components/schemas/User'
    APIKey:
      type: object
      required:
        - id
        - subject_user_id
        - label
        - scope_type
        - created_at
      properties:
        id:
          type: string
          format: uuid
          description: API key identifier.
        subject_user_id:
          type: string
          format: uuid
          description: User principal authenticated by this API key.
        label:
          type: string
          description: Human-readable API key label.
        scope_type:
          type: string
          enum:
            - user
            - workspace
          description: Whether the key is user-scoped or workspace-scoped.
        scope_workspace_id:
          type: string
          format: uuid
          nullable: true
          description: Workspace bound to the key when scope_type is workspace.
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: Optional API key expiration time.
        last_used_at:
          type: string
          format: date-time
          nullable: true
          description: Last observed use time.
        revoked_at:
          type: string
          format: date-time
          nullable: true
          description: Revocation time when the key has been revoked.
        created_at:
          type: string
          format: date-time
          description: Creation time.
    APIKeysCollection:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/APIKey'
        next_cursor:
          type: string
          description: Pagination cursor when additional results are available.
    CreateAPIKeyRequest:
      type: object
      required:
        - label
        - scope_type
      properties:
        label:
          type: string
          description: Human-readable API key label.
        subject_user_id:
          type: string
          format: uuid
          nullable: true
          description: Optional subject user to authenticate as. Defaults to the current user and may also reference one manageable agent.
        scope_type:
          type: string
          enum:
            - user
            - workspace
          description: Whether to create a personal key or a workspace-scoped key.
        scope_workspace_id:
          type: string
          format: uuid
          nullable: true
          description: Required when scope_type is workspace. Must be omitted for user-scoped keys.
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: Optional RFC3339 expiration time for the key.
    CreateAPIKeyResponse:
      type: object
      required:
        - api_key
        - secret
      properties:
        api_key:
          $ref: '#/components/schemas/APIKey'
        secret:
          type: string
          description: Plaintext API key secret. It is returned only once.
    SearchRequest:
      type: object
      required:
        - query
      properties:
        query:
          type: string
          description: Search query text.
        kinds:
          type: array
          description: Optional resource kinds to search.
          items:
            type: string
            enum:
              - message
              - conversation
              - workspace
              - user
              - event
        workspace_id:
          type: string
          format: uuid
          nullable: true
          description: Optional workspace scope filter.
        conversation_id:
          type: string
          format: uuid
          nullable: true
          description: Optional conversation scope filter.
        cursor:
          type: string
          description: Opaque pagination cursor from a previous response.
        limit:
          type: integer
          description: Maximum number of results to return.
    SearchHit:
      type: object
      required:
        - kind
        - resource_id
        - score
      properties:
        kind:
          type: string
          enum:
            - message
            - conversation
            - workspace
            - user
            - event
        resource_id:
          type: string
          description: Canonical resource identifier.
        score:
          type: number
          format: double
          description: Fused ranking score.
        title:
          type: string
          nullable: true
          description: Result title.
        snippet:
          type: string
          nullable: true
          description: Short preview text.
        workspace_id:
          type: string
          format: uuid
          nullable: true
          description: Workspace scope for the hit when applicable.
        conversation_id:
          type: string
          format: uuid
          nullable: true
          description: Conversation scope for the hit when applicable.
        message:
          $ref: '#/components/schemas/Message'
        conversation:
          $ref: '#/components/schemas/Conversation'
        workspace:
          $ref: '#/components/schemas/Workspace'
        user:
          $ref: '#/components/schemas/User'
        event:
          $ref: '#/components/schemas/ExternalEvent'
    SearchResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/SearchHit'
        next_cursor:
          type: string
          description: Pagination cursor when additional results are available.
    Workspace:
      type: object
      required:
        - id
        - slug
        - name
        - created_by_user_id
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          description: Workspace identifier.
        slug:
          type: string
          description: Workspace slug.
        name:
          type: string
          description: Workspace display name.
        created_by_user_id:
          type: string
          format: uuid
          description: Creator user identifier.
        created_at:
          type: string
          format: date-time
          description: Creation time.
        updated_at:
          type: string
          format: date-time
          description: Last update time.
    WorkspacesCollection:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Workspace'
        next_cursor:
          type: string
          description: Pagination cursor when additional results are available.
    CreateWorkspaceRequest:
      type: object
      required:
        - name
        - slug
      properties:
        name:
          type: string
          description: Workspace display name.
        slug:
          type: string
          description: Workspace slug. The server normalizes it to lowercase.
    UpdateWorkspaceRequest:
      type: object
      properties:
        name:
          type: string
          description: New workspace display name.
        slug:
          type: string
          description: New workspace slug.
    WorkspaceMember:
      type: object
      required:
        - workspace_id
        - user_id
        - role
        - status
        - user
      properties:
        workspace_id:
          type: string
          format: uuid
          description: Workspace identifier.
        user_id:
          type: string
          format: uuid
          description: User identifier.
        role:
          type: string
          enum:
            - owner
            - admin
            - member
          description: Role held in the workspace.
        status:
          type: string
          enum:
            - invited
            - active
            - suspended
            - removed
          description: Membership status.
        user:
          $ref: '#/components/schemas/User'
    WorkspaceMembersCollection:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/WorkspaceMember'
        next_cursor:
          type: string
          description: Pagination cursor when additional results are available.
    CreateWorkspaceInviteRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          nullable: true
          description: Optional email address that must match the accepting principal.
        user_id:
          type: string
          format: uuid
          nullable: true
          description: Optional user identifier that must match the accepting principal.
    CreateWorkspaceInviteResponse:
      type: object
      required:
        - invite_token
        - invite_url
      properties:
        invite_token:
          type: string
          description: Raw workspace invite token.
        invite_url:
          type: string
          format: uri
          description: Accept URL for the invite token.
    UpdateWorkspaceMemberRequest:
      type: object
      description: At least one field is required.
      properties:
        role:
          type: string
          enum:
            - owner
            - admin
            - member
          description: New workspace role.
        status:
          type: string
          enum:
            - invited
            - active
            - suspended
            - removed
          description: New workspace membership status.
    Conversation:
      type: object
      required:
        - id
        - access_policy
        - participant_count
        - created_by_user_id
        - archived
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          description: Conversation identifier.
        workspace_id:
          type: string
          format: uuid
          nullable: true
          description: Workspace owning the conversation, or null for global conversations.
        access_policy:
          type: string
          enum:
            - members
            - workspace
          description: Conversation visibility policy.
        participant_count:
          type: integer
          description: Number of participants currently in the conversation.
        title:
          type: string
          nullable: true
          description: Conversation title.
        description:
          type: string
          nullable: true
          description: Conversation description.
        created_by_user_id:
          type: string
          format: uuid
          description: Creator user identifier.
        archived:
          type: boolean
          description: Whether the conversation is archived.
        last_message_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of the most recent message.
        created_at:
          type: string
          format: date-time
          description: Creation time.
        updated_at:
          type: string
          format: date-time
          description: Last update time.
        share_link:
          allOf:
            - $ref: '#/components/schemas/ConversationShareLink'
          nullable: true
          description: Current share link returned only from conversation creation for eligible private conversations.
    ConversationsCollection:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Conversation'
        next_cursor:
          type: string
          description: Pagination cursor when additional results are available.
    CreateConversationRequest:
      type: object
      properties:
        workspace_id:
          type: string
          format: uuid
          nullable: true
          description: Workspace to create the conversation in. Omit for global conversations.
        access_policy:
          type: string
          default: members
          enum:
            - members
            - workspace
          description: Visibility policy for the conversation. Defaults to members when omitted.
        participant_user_ids:
          type: array
          description: Participant user ids for member-only conversations. Omit for workspace conversations.
          items:
            type: string
            format: uuid
        title:
          type: string
          nullable: true
          description: Conversation title. Required for workspace conversations.
        description:
          type: string
          nullable: true
          description: Optional conversation description.
    UpdateConversationRequest:
      type: object
      properties:
        title:
          type: string
          nullable: true
          description: New conversation title.
        description:
          type: string
          nullable: true
          description: New conversation description.
        archived:
          type: boolean
          nullable: true
          description: Whether to archive or unarchive the conversation.
    UsersCollection:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/User'
        next_cursor:
          type: string
          description: Pagination cursor when additional results are available.
    AddParticipantsRequest:
      type: object
      required:
        - user_ids
      properties:
        user_ids:
          type: array
          description: Users to add to the conversation.
          items:
            type: string
            format: uuid
    JoinConversationRequest:
      type: object
      required:
        - token
      properties:
        token:
          type: string
          description: Raw share link token.
    ConversationShareLink:
      type: object
      required:
        - token
        - url
      properties:
        token:
          type: string
          description: Raw share link token.
        url:
          type: string
          format: uri
          description: Browser join URL for the share link token.
    Message:
      type: object
      required:
        - id
        - conversation_id
        - author_user_id
        - body_text
        - created_at
      properties:
        id:
          type: string
          format: uuid
          description: Message identifier.
        conversation_id:
