          nullable: true
          description: Optional API key expiration time.
        last_used_at:
          type: string
          format: date-time
          nullable: true
          description: Last observed use time.
        revoked_at:
          type: string
          format: date-time
          nullable: true
          description: Revocation time when the key has been revoked.
