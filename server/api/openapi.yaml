components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: token
  headers:
    Location:
      description: Resource URI.
      schema:
        type: string
  responses:
    NoContent:
      description: No content.
    ApiErrorResponse:
      description: API error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/APIError"
  parameters:
    TeamIDPath:
      name: id
      in: path
      required: true
      schema:
        type: string
    AuthProviderPath:
      name: provider
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/AuthProvider"
    TeamIDQuery:
      name: team_id
      in: query
      schema:
        type: string
    UserIDPath:
      name: id
      in: path
      required: true
      schema:
        type: string
    UserIDPathNamed:
      name: user_id
      in: path
      required: true
      schema:
        type: string
    ConversationIDPath:
      name: id
      in: path
      required: true
      schema:
        type: string
    ConversationIDPathNamed:
      name: conversation_id
      in: path
      required: true
      schema:
        type: string
    ExternalTeamIDPath:
      name: external_team_id
      in: path
      required: true
      schema:
        type: string
    ExternalPrincipalAccessIDPath:
      name: id
      in: path
      required: true
      schema:
        type: string
    BookmarkIDPath:
      name: bookmark_id
      in: path
      required: true
      schema:
        type: string
    MessageTSPath:
      name: message_ts
      in: path
      required: true
      schema:
        type: string
    ReactionNamePath:
      name: reaction_name
      in: path
      required: true
      schema:
        type: string
    UsergroupIDPath:
      name: id
      in: path
      required: true
      schema:
        type: string
    FileIDPath:
      name: id
      in: path
      required: true
      schema:
        type: string
    EventSubscriptionIDPath:
      name: id
      in: path
      required: true
      schema:
        type: string
    APIKeyIDPath:
      name: id
      in: path
      required: true
      schema:
        type: string
    CursorQuery:
      name: cursor
      in: query
      schema:
        type: string
    LimitQuery:
      name: limit
      in: query
      schema:
        type: integer
        format: int32
        minimum: 0
  schemas:
    HealthStatusResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]
    APIError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        request_id:
          type: string
        errors:
          type: array
          items:
            $ref: "#/components/schemas/FieldError"
    FieldError:
      type: object
      required: [field, code, message]
      properties:
        field:
          type: string
        code:
          type: string
        message:
          type: string
    FreeFormJSON: {}
    FreeFormObject:
      type: object
      additionalProperties: true
    PrincipalType:
      type: string
      enum: [human, agent, system]
    AccountType:
      type: string
      enum: [primary_admin, admin, member]
    DelegatedRole:
      type: string
      enum: [channels_admin, roles_admin, security_admin, integrations_admin, usergroups_admin, support_readonly]
    ExternalPrincipalAccessMode:
      type: string
      enum: [external_shared, external_shared_readonly]
    ConversationPostingPolicyType:
      type: string
      enum: [everyone, admins_only, members_with_permission, custom]
    AuthProvider:
      type: string
      enum: [github, google]
    WorkspaceDiscoverability:
      type: string
      enum: [open, invite_only]
    ConversationType:
      type: string
      enum: [public_channel, private_channel, im, mpim]
    APIKeyType:
      type: string
      enum: [persistent, session, restricted]
    APIKeyEnvironment:
      type: string
      enum: [live, test]
