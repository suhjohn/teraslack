openapi: 3.0.3
info:
  title: Teraslack API
  version: 1.0.0
  description: Canonical HTTP API for Teraslack.
security:
  - bearerAuth: []
tags:
  - name: Health
  - name: Workspaces
  - name: Invites
  - name: Users
  - name: Conversations
  - name: Messages
  - name: Usergroups
  - name: Files
  - name: Events
  - name: Event Subscriptions
  - name: Auth
  - name: API Keys
  - name: Search
paths:
  /healthz:
    get:
      tags: [Health]
      operationId: getHealth
      security: []
      responses:
        "200":
          description: Service health.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatusResponse"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /workspaces:
    get:
      tags: [Workspaces]
      operationId: listWorkspaces
      responses:
        "200":
          description: Workspaces visible to the authenticated caller. Human sessions receive the workspaces they are a member of.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspacesCollection"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
    post:
      tags: [Workspaces]
      operationId: createWorkspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkspaceRequest"
      responses:
        "201":
          description: Workspace created.
          headers:
            Location:
              $ref: "#/components/headers/Location"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /workspaces/{id}:
    get:
      tags: [Workspaces]
      operationId: getWorkspace
      parameters:
        - $ref: "#/components/parameters/WorkspaceIDPath"
      responses:
        "200":
          description: Workspace. Human sessions may only access their current workspace.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
    patch:
      tags: [Workspaces]
      operationId: updateWorkspace
      parameters:
        - $ref: "#/components/parameters/WorkspaceIDPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWorkspaceRequest"
      responses:
        "200":
          description: Workspace updated. Human sessions may only update their current workspace.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /workspaces/{id}/admins:
    get:
      tags: [Workspaces]
      operationId: listWorkspaceAdmins
      parameters:
        - $ref: "#/components/parameters/WorkspaceIDPath"
      responses:
        "200":
          description: Workspace admins.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsersCollection"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /workspaces/{id}/owners:
    get:
      tags: [Workspaces]
      operationId: listWorkspaceOwners
      parameters:
        - $ref: "#/components/parameters/WorkspaceIDPath"
      responses:
        "200":
          description: Workspace owners.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsersCollection"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /workspaces/{id}/access-logs:
    get:
      tags: [Workspaces]
      operationId: listWorkspaceAccessLogs
      parameters:
        - $ref: "#/components/parameters/WorkspaceIDPath"
        - $ref: "#/components/parameters/LimitQuery"
      responses:
        "200":
          description: Workspace access logs.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceAccessLogsCollection"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /workspaces/{id}/authorization-audit-logs:
    get:
      tags: [Workspaces]
      operationId: listWorkspaceAuthorizationAuditLogs
      parameters:
        - $ref: "#/components/parameters/WorkspaceIDPath"
        - $ref: "#/components/parameters/LimitQuery"
      responses:
        "200":
          description: Workspace authorization audit logs.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthorizationAuditLogsCollection"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /workspaces/{id}/billable-info:
    get:
      tags: [Workspaces]
      operationId: getWorkspaceBillableInfo
      parameters:
        - $ref: "#/components/parameters/WorkspaceIDPath"
      responses:
        "200":
          description: Workspace billable info.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceBillableInfoMap"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /workspaces/{id}/billing:
    get:
      tags: [Workspaces]
      operationId: getWorkspaceBilling
      parameters:
        - $ref: "#/components/parameters/WorkspaceIDPath"
      responses:
        "200":
          description: Workspace billing.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceBilling"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /workspaces/{id}/external-workspaces:
    post:
      tags: [Workspaces]
      operationId: createExternalWorkspace
      parameters:
        - $ref: "#/components/parameters/WorkspaceIDPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExternalWorkspaceRequest"
      responses:
        "201":
          description: External workspace connected.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExternalWorkspace"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
    get:
      tags: [Workspaces]
      operationId: listExternalWorkspaces
      parameters:
        - $ref: "#/components/parameters/WorkspaceIDPath"
      responses:
        "200":
          description: External workspace connections.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExternalWorkspacesCollection"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /workspaces/{id}/external-workspaces/{external_workspace_id}:
    delete:
      tags: [Workspaces]
      operationId: disconnectExternalWorkspace
      parameters:
        - $ref: "#/components/parameters/WorkspaceIDPath"
        - $ref: "#/components/parameters/ExternalWorkspaceIDPath"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /workspaces/{id}/integration-logs:
    get:
      tags: [Workspaces]
      operationId: listWorkspaceIntegrationLogs
      parameters:
        - $ref: "#/components/parameters/WorkspaceIDPath"
        - $ref: "#/components/parameters/LimitQuery"
      responses:
        "200":
          description: Workspace integration logs.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceIntegrationLogsCollection"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /workspaces/{id}/primary-admin:
    post:
      tags: [Workspaces]
      operationId: transferPrimaryAdmin
      parameters:
        - $ref: "#/components/parameters/WorkspaceIDPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransferPrimaryAdminRequest"
      responses:
        "200":
          description: Updated primary admin.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /workspaces/{id}/preferences:
    get:
      tags: [Workspaces]
      operationId: getWorkspacePreferences
      parameters:
        - $ref: "#/components/parameters/WorkspaceIDPath"
      responses:
        "200":
          description: Workspace preferences.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FreeFormObject"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /workspaces/{id}/invites:
    post:
      tags: [Workspaces]
      operationId: createWorkspaceInvite
      parameters:
        - $ref: "#/components/parameters/WorkspaceIDPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkspaceInviteRequest"
      responses:
        "201":
          description: Workspace invite created.
          headers:
            Location:
              $ref: "#/components/headers/Location"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateWorkspaceInviteResponse"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /invites/accept:
    post:
      tags: [Invites]
      operationId: acceptInvite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcceptWorkspaceInviteRequest"
      responses:
        "200":
          description: Workspace invite accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptWorkspaceInviteResponse"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /users:
    get:
      tags: [Users]
      operationId: listUsers
      parameters:
        - $ref: "#/components/parameters/WorkspaceIDQuery"
        - $ref: "#/components/parameters/CursorQuery"
        - $ref: "#/components/parameters/LimitQuery"
        - name: email
          in: query
          description: Filter by exact email address.
          schema:
            type: string
      responses:
        "200":
          description: Users.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsersCollection"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
    post:
      tags: [Users]
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created.
          headers:
            Location:
              $ref: "#/components/headers/Location"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /users/{id}:
    get:
      tags: [Users]
      operationId: getUser
      parameters:
        - $ref: "#/components/parameters/UserIDPath"
      responses:
        "200":
          description: User.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
    patch:
      tags: [Users]
      operationId: updateUser
      parameters:
        - $ref: "#/components/parameters/UserIDPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: User updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /users/{id}/roles:
    get:
      tags: [Users]
      operationId: getUserRoles
      parameters:
        - $ref: "#/components/parameters/UserIDPath"
      responses:
        "200":
          description: Delegated roles for the user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserRolesResponse"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
    put:
      tags: [Users]
      operationId: updateUserRoles
      parameters:
        - $ref: "#/components/parameters/UserIDPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRolesRequest"
      responses:
        "200":
          description: Delegated roles updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserRolesResponse"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /conversations:
    get:
      tags: [Conversations]
      operationId: listConversations
      parameters:
        - $ref: "#/components/parameters/WorkspaceIDQuery"
        - $ref: "#/components/parameters/CursorQuery"
        - $ref: "#/components/parameters/LimitQuery"
        - name: types
          in: query
          description: Comma-separated conversation types to include.
          style: form
          explode: false
          schema:
            type: array
            items:
              $ref: "#/components/schemas/ConversationType"
        - name: exclude_archived
          in: query
          description: When true, omit archived conversations from results.
          schema:
            type: boolean
      responses:
        "200":
          description: Conversations.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationsCollection"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
    post:
      tags: [Conversations]
      operationId: createConversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConversationRequest"
      responses:
        "201":
          description: Conversation created.
          headers:
            Location:
              $ref: "#/components/headers/Location"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /conversations/{id}:
    get:
      tags: [Conversations]
      operationId: getConversation
      parameters:
        - $ref: "#/components/parameters/ConversationIDPath"
      responses:
        "200":
          description: Conversation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
    patch:
      tags: [Conversations]
      operationId: updateConversation
      parameters:
        - $ref: "#/components/parameters/ConversationIDPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConversationUpdateRequest"
      responses:
        "200":
          description: Conversation updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /conversations/{id}/members:
    get:
      tags: [Conversations]
      operationId: listConversationMembers
      parameters:
        - $ref: "#/components/parameters/ConversationIDPath"
        - $ref: "#/components/parameters/CursorQuery"
        - $ref: "#/components/parameters/LimitQuery"
      responses:
        "200":
          description: Conversation member ids.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StringsCollection"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
    post:
      tags: [Conversations]
      operationId: addConversationMembers
      parameters:
        - $ref: "#/components/parameters/ConversationIDPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConversationInviteRequest"
      responses:
        "200":
          description: Conversation membership updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /conversations/{id}/members/{user_id}:
    delete:
      tags: [Conversations]
      operationId: removeConversationMember
      parameters:
        - $ref: "#/components/parameters/ConversationIDPath"
        - $ref: "#/components/parameters/UserIDPathNamed"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /conversations/{id}/external-members:
    get:
      tags: [Conversations]
      operationId: listConversationExternalMembers
      parameters:
        - $ref: "#/components/parameters/ConversationIDPath"
      responses:
        "200":
          description: External members for the conversation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExternalMembersCollection"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
    post:
      tags: [Conversations]
      operationId: createConversationExternalMember
      parameters:
        - $ref: "#/components/parameters/ConversationIDPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExternalMemberRequest"
      responses:
        "201":
          description: External member created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExternalMember"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /conversations/{id}/external-members/{external_member_id}:
    patch:
      tags: [Conversations]
      operationId: updateConversationExternalMember
      parameters:
        - $ref: "#/components/parameters/ConversationIDPath"
        - $ref: "#/components/parameters/ExternalMemberIDPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateExternalMemberRequest"
      responses:
        "200":
          description: External member updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExternalMember"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
    delete:
      tags: [Conversations]
      operationId: deleteConversationExternalMember
      parameters:
        - $ref: "#/components/parameters/ConversationIDPath"
        - $ref: "#/components/parameters/ExternalMemberIDPath"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /conversations/{id}/managers:
    get:
      tags: [Conversations]
      operationId: getConversationManagers
      parameters:
        - $ref: "#/components/parameters/ConversationIDPath"
      responses:
        "200":
          description: Conversation managers.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationManagersResponse"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
    put:
      tags: [Conversations]
      operationId: updateConversationManagers
      parameters:
        - $ref: "#/components/parameters/ConversationIDPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConversationManagersUpdateRequest"
      responses:
        "200":
          description: Conversation managers updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationManagersResponse"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /conversations/{id}/posting-policy:
    get:
      tags: [Conversations]
      operationId: getConversationPostingPolicy
      parameters:
        - $ref: "#/components/parameters/ConversationIDPath"
      responses:
        "200":
          description: Conversation posting policy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationPostingPolicyResponse"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
    put:
      tags: [Conversations]
      operationId: updateConversationPostingPolicy
      parameters:
        - $ref: "#/components/parameters/ConversationIDPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConversationPostingPolicyUpdateRequest"
      responses:
        "200":
          description: Conversation posting policy updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationPostingPolicyResponse"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /conversations/{id}/read-state:
    put:
      tags: [Conversations]
      operationId: updateConversationReadState
      parameters:
        - $ref: "#/components/parameters/ConversationIDPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConversationReadUpdateRequest"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /messages:
    get:
      tags: [Messages]
      operationId: listMessages
      parameters:
        - name: conversation_id
          in: query
          description: Return messages from this conversation.
          schema:
            type: string
        - name: thread_ts
          in: query
          description: Return only replies in this thread (identified by the parent message timestamp).
          schema:
            type: string
        - name: latest
          in: query
          description: End of time range (message timestamp). Only messages before this timestamp are returned.
          schema:
            type: string
        - name: oldest
          in: query
          description: Start of time range (message timestamp). Only messages after this timestamp are returned.
          schema:
            type: string
        - name: inclusive
          in: query
          description: When true, include messages with timestamps exactly matching latest or oldest.
          schema:
            type: boolean
        - name: include_all_metadata
          in: query
          description: When true, include full metadata on each message.
          schema:
            type: boolean
        - $ref: "#/components/parameters/CursorQuery"
        - $ref: "#/components/parameters/LimitQuery"
      responses:
        "200":
          description: Messages.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessagesCollection"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
    post:
      tags: [Messages]
      operationId: createMessage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostMessageRequest"
      responses:
        "201":
          description: Message created.
          headers:
            Location:
              $ref: "#/components/headers/Location"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /messages/{conversation_id}/{message_ts}:
    patch:
      tags: [Messages]
      operationId: updateMessage
      parameters:
        - $ref: "#/components/parameters/ConversationIDPathNamed"
        - $ref: "#/components/parameters/MessageTSPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMessageRequest"
      responses:
        "200":
          description: Message updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
    delete:
      tags: [Messages]
      operationId: deleteMessage
      parameters:
        - $ref: "#/components/parameters/ConversationIDPathNamed"
        - $ref: "#/components/parameters/MessageTSPath"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /messages/{conversation_id}/{message_ts}/reactions:
    get:
      tags: [Messages]
      operationId: listMessageReactions
      parameters:
        - $ref: "#/components/parameters/ConversationIDPathNamed"
        - $ref: "#/components/parameters/MessageTSPath"
      responses:
        "200":
          description: Message reactions.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Reaction"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
    post:
      tags: [Messages]
      operationId: createMessageReaction
      parameters:
        - $ref: "#/components/parameters/ConversationIDPathNamed"
        - $ref: "#/components/parameters/MessageTSPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageReactionRequest"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /messages/{conversation_id}/{message_ts}/reactions/{reaction_name}:
    delete:
      tags: [Messages]
      operationId: deleteMessageReaction
      parameters:
        - $ref: "#/components/parameters/ConversationIDPathNamed"
        - $ref: "#/components/parameters/MessageTSPath"
        - $ref: "#/components/parameters/ReactionNamePath"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
  /file-uploads:
    post:
      tags: [Files]
      operationId: createFileUpload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GetUploadURLRequest"
      responses:
        "201":
          description: Upload slot created.
          headers:
            Location:
              $ref: "#/components/headers/Location"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetUploadURLResponse"
        default:
          $ref: "#/components/responses/ApiErrorResponse"
