        expires_at:
          type: string
          format: date-time
          description: When the invite expires.
        accepted_at:
          type: string
          format: date-time
          description: When the invite was accepted.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateWorkspaceInviteRequest:
