name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: true

env:
  RAILWAY_ENV: ${{ vars.RAILWAY_ENVIRONMENT || 'production' }}
  RAILWAY_PROJECT: ${{ secrets.RAILWAY_PROJECT_ID }}

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Verify server build
        working-directory: server
        run: go build ./cmd/server ./cmd/teraslack-stdio-mcp

      - name: Verify targeted server tests
        working-directory: server
        run: go test ./internal/service ./internal/handler ./internal/repository/postgres ./internal/teraslackstdio ./cmd/server ./cmd/teraslack-stdio-mcp

      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Verify frontend build
        working-directory: frontend
        run: bun run build

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: verify
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy frontend
        run: make railway-deploy SERVICE=frontend

  deploy-server:
    runs-on: ubuntu-latest
    needs: verify
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy server
        run: make railway-deploy SERVICE=server
