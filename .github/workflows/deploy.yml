name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: true

env:
  RAILWAY_ENV: ${{ vars.RAILWAY_ENVIRONMENT || 'production' }}
  RAILWAY_PROJECT: ${{ secrets.RAILWAY_PROJECT_ID }}

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Verify deployed server binaries build
        working-directory: server
        run: go build ./cmd/server ./cmd/queue-broker ./cmd/indexer ./cmd/external-event-projector ./cmd/webhook-producer ./cmd/webhook-worker ./cmd/teraslack-api

      - name: Verify targeted server tests
        working-directory: server
        run: go test ./internal/repository ./internal/handler ./internal/openapicli ./cmd/server ./cmd/teraslack-api

      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Verify frontend build
        working-directory: frontend
        run: bun run build

  deploy:
    runs-on: ubuntu-latest
    needs: verify
    environment: Prod
    strategy:
      fail-fast: false
      matrix:
        service:
          - frontend
          - server
          - queue-broker
          - indexer
          - external-event-projector
          - webhook-producer
          - webhook-worker
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy ${{ matrix.service }}
        run: make deploy-${{ matrix.service }}
