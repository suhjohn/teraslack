services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: slackbackend
      POSTGRES_USER: slackbackend
      POSTGRES_PASSWORD: slackbackend
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slackbackend"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
