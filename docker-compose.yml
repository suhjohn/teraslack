x-app-env: &app-env
  DATABASE_URL: postgres://slackbackend:slackbackend@db:${DB_PORT:-35432}/slackbackend?sslmode=disable
  MIGRATION_DATABASE_URL: postgres://slackbackend:slackbackend@db:${DB_PORT:-35432}/slackbackend?sslmode=disable
  BASE_URL: ${BASE_URL:-http://localhost:${API_PORT:-38080}}
  FRONTEND_URL: ${FRONTEND_URL:-http://localhost:${FRONTEND_PORT:-3201}}
  AUTH_STATE_SECRET: ${AUTH_STATE_SECRET:-}
  AWS_KMS_KEY_ID: ${AWS_KMS_KEY_ID:-}
  AWS_KMS_REGION: ${AWS_KMS_REGION:-${AWS_REGION:-}}
  AWS_KMS_ENDPOINT: ${AWS_KMS_ENDPOINT:-}
  S3_REGION: ${S3_REGION:-us-east-1}
  S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
  S3_BUCKET: ${S3_BUCKET:-teraslack-local}
  S3_ACCESS_KEY: ${S3_ACCESS_KEY:-teraslack}
  S3_SECRET_KEY: ${S3_SECRET_KEY:-teraslack-secret}
  PROJECTOR_QUEUE_S3_KEY: ${PROJECTOR_QUEUE_S3_KEY:-queues/projector/queue.json}
  WEBHOOK_QUEUE_S3_KEY: ${WEBHOOK_QUEUE_S3_KEY:-queues/webhooks/queue.json}
  INDEX_QUEUE_S3_KEY: ${INDEX_QUEUE_S3_KEY:-queues/index/queue.json}
  GITHUB_OAUTH_CLIENT_ID: ${GITHUB_OAUTH_CLIENT_ID:-}
  GITHUB_OAUTH_CLIENT_SECRET: ${GITHUB_OAUTH_CLIENT_SECRET:-}
  GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
  GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
  ENCRYPTION_KEY: ${ENCRYPTION_KEY:-00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff}

x-server-build: &server-build
  context: ./server
  dockerfile: Dockerfile

x-app-service: &app-service
  image: teraslack-server-local
  build: *server-build
  environment:
    <<: *app-env
  depends_on:
    db:
      condition: service_healthy
    minio-setup:
      condition: service_completed_successfully
  extra_hosts:
    - "host.docker.internal:host-gateway"
  restart: unless-stopped

services:
  db:
    image: postgres:16
    command: postgres -p ${DB_PORT:-35432}
    environment:
      POSTGRES_DB: slackbackend
      POSTGRES_USER: slackbackend
      POSTGRES_PASSWORD: slackbackend
    ports:
      - "${DB_PORT:-35432}:${DB_PORT:-35432}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slackbackend -p ${DB_PORT:-35432}"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-teraslack}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-teraslack-secret}
    ports:
      - "${MINIO_API_PORT:-39000}:9000"
      - "${MINIO_CONSOLE_PORT:-39001}:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  minio-setup:
    image: minio/mc:RELEASE.2025-02-21T16-00-46Z
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 "${S3_ACCESS_KEY:-teraslack}" "${S3_SECRET_KEY:-teraslack-secret}"; do
          sleep 1
        done
        mc mb --ignore-existing "local/${S3_BUCKET:-teraslack-local}"
    restart: "no"

  webhook-recorder:
    image: python:3.12-alpine
    command: ["python", "/app/webhook_recorder.py"]
    volumes:
      - ./server/internal/integration/webhook_recorder.py:/app/webhook_recorder.py:ro
    ports:
      - "127.0.0.1:${WEBHOOK_RECORDER_PORT:-39002}:8090"
    restart: unless-stopped

  server:
    <<: *app-service
    environment:
      <<: *app-env
      PORT: ${API_PORT:-38080}
    ports:
      - "${API_PORT:-38080}:${API_PORT:-38080}"

  external-event-projector:
    <<: *app-service
    command: ["/app/external-event-projector"]

  webhook-producer:
    <<: *app-service
    command: ["/app/webhook-producer"]

  webhook-worker:
    <<: *app-service
    command: ["/app/webhook-worker"]
    environment:
      <<: *app-env
      WORKER_ID: ${WEBHOOK_WORKER_ID:-wh-1}

  indexer:
    <<: *app-service
    command: ["/app/indexer"]
    environment:
      <<: *app-env
      WORKER_ID: ${INDEXER_WORKER_ID:-idx-1}

volumes:
  pgdata:
  minio_data:
