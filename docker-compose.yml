x-app-env: &app-env
  DATABASE_URL: postgres://slackbackend:slackbackend@db:${DB_PORT:-35432}/slackbackend?sslmode=disable
  BASE_URL: http://server:${API_PORT:-38080}
  S3_BUCKET: ${S3_BUCKET}
  S3_REGION: ${S3_REGION:-us-west-2}
  S3_ENDPOINT: ${S3_ENDPOINT:-}
  S3_ACCESS_KEY: ${S3_ACCESS_KEY:-${AWS_ACCESS_KEY_ID:-}}
  S3_SECRET_KEY: ${S3_SECRET_KEY:-${AWS_SECRET_ACCESS_KEY:-}}
  S3_KEY_PREFIX: ${S3_KEY_PREFIX:-}
  TURBOPUFFER_API_KEY: ${TURBOPUFFER_API_KEY:-}
  TURBOPUFFER_NS_PREFIX: ${TURBOPUFFER_NS_PREFIX:-teraslack}
  ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}

services:
  db:
    image: postgres:16
    command: postgres -p ${DB_PORT:-35432}
    environment:
      POSTGRES_DB: slackbackend
      POSTGRES_USER: slackbackend
      POSTGRES_PASSWORD: slackbackend
    ports:
      - "${DB_PORT:-35432}:${DB_PORT:-35432}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slackbackend -p ${DB_PORT:-35432}"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      <<: *app-env
      PORT: ${API_PORT:-38080}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${API_PORT:-38080}:${API_PORT:-38080}"
    restart: unless-stopped

  external-event-projector:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/app/external-event-projector"]
    environment:
      <<: *app-env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  webhook-producer:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/app/webhook-producer"]
    environment:
      <<: *app-env
      WEBHOOK_QUEUE_S3_KEY: ${WEBHOOK_QUEUE_S3_KEY:-queues/webhooks/queue.json}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  webhook-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/app/webhook-worker"]
    environment:
      <<: *app-env
      WEBHOOK_QUEUE_S3_KEY: ${WEBHOOK_QUEUE_S3_KEY:-queues/webhooks/queue.json}
      WORKER_ID: ${WEBHOOK_WORKER_ID:-wh-1}
    restart: unless-stopped

  indexer:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/app/indexer"]
    environment:
      <<: *app-env
      INDEX_QUEUE_S3_KEY: ${INDEX_QUEUE_S3_KEY:-queues/index/queue.json}
      WORKER_ID: ${INDEXER_WORKER_ID:-idx-1}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
